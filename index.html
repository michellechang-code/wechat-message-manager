<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>訊息管理系統</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet" />
<style>
* { font-family: 'Noto Sans TC', sans-serif; box-sizing: border-box; }

/* ── 護眼色盤（暖灰米白系） ── */
:root {
  --bg:       #f0ede8;   /* 頁面底色：暖米灰 */
  --surface:  #e8e4de;   /* header/tab底色 */
  --card:     #faf8f5;   /* 卡片白 */
  --border:   #d4cfc8;   /* 邊框：暖灰 */
  --border2:  #c8c2bb;   /* 深一點邊框 */
  --accent:   #3b76d4;   /* 藍色accent */
  --accent-bg:#deeaf8;   /* 藍色淡背景 */
  --text-h:   #1a1a1a;   /* 標題文字 */
  --text-b:   #3d3d3d;   /* 內文文字 */
  --text-m:   #7a7570;   /* 次要文字 */
  --text-s:   #a09990;   /* 更淺文字 */
  --green:    #1a7a4a;
  --green-bg: #d4f0e2;
  --amber:    #8a5a00;
  --amber-bg: #fdedc8;
  --teal:     #0d6e6e;
  --teal-bg:  #cceeee;
  --red:      #b03030;
  --red-bg:   #fde0e0;
}

body { background: var(--bg); color: var(--text-b); min-height: 100vh; }

::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* badges */
.badge { display:inline-flex; align-items:center; gap:4px; font-size:11px; font-weight:500; padding:2px 8px; border-radius:9999px; }
.badge-blue  { background:var(--accent-bg); color:var(--accent); }
.badge-green { background:var(--green-bg);  color:var(--green); }
.badge-amber { background:var(--amber-bg);  color:var(--amber); }
.badge-gray  { background:#e8e4de; color:#5a5550; border:1px solid var(--border); }
.badge-teal  { background:var(--teal-bg);   color:var(--teal); }
.badge-red   { background:var(--red-bg);    color:var(--red); }

.status-dot { width:6px; height:6px; border-radius:50%; display:inline-block; }
.dot-green { background:var(--green); }
.dot-amber { background:#c07800; }
.dot-gray  { background:var(--text-s); }

/* inputs */
.input-field {
  background: var(--card);
  border: 1px solid var(--border);
  color: var(--text-b);
  border-radius: 8px;
  padding: 8px 12px;
  font-size: 14px;
  width: 100%;
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.input-field:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(59,118,212,0.1); }
.input-field::placeholder { color: var(--text-s); }
select.input-field option { background: var(--card); color: var(--text-b); }
textarea.input-field { resize: none; line-height: 1.7; }

/* buttons */
.btn-primary {
  background: var(--accent); color: #fff;
  border: none; border-radius: 8px;
  padding: 9px 18px; font-size: 14px; font-weight: 500;
  cursor: pointer;
  transition: background 0.2s, transform 0.1s, box-shadow 0.2s;
  display: inline-flex; align-items: center; gap: 6px;
}
.btn-primary:hover  { background: #2a62c0; box-shadow: 0 2px 10px rgba(59,118,212,0.25); }
.btn-primary:active { transform: scale(0.97); }
.btn-primary:disabled { opacity:0.5; cursor:not-allowed; }

.btn-ghost {
  background: transparent; color: var(--text-m);
  border: 1px solid var(--border); border-radius: 8px;
  padding: 7px 14px; font-size: 13px; cursor: pointer;
  transition: background 0.2s, color 0.2s;
}
.btn-ghost:hover { background: var(--border); color: var(--text-b); }

.type-btn {
  padding: 5px 14px; font-size: 12px; border-radius: 20px;
  border: 1px solid var(--border); background: transparent;
  color: var(--text-m); cursor: pointer; transition: all 0.2s;
}
.type-btn.active { background: var(--accent-bg); color: var(--accent); border-color: var(--accent); }

/* cards */
.msg-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 14px 16px;
  margin-bottom: 10px;
  cursor: pointer;
  transition: border-color 0.2s, box-shadow 0.2s, transform 0.15s;
}
.msg-card:hover {
  border-color: var(--accent);
  box-shadow: 0 2px 14px rgba(59,118,212,0.10);
  transform: translateY(-1px);
}

/* nav */
.top-nav { background: var(--surface); border-bottom: 1px solid var(--border2); position:sticky; top:0; z-index:50; }
.tab-bar  { background: var(--surface); border-bottom: 1px solid var(--border2); position:sticky; top:57px; z-index:40; }

/* tab active */
.tab-btn { padding:12px 20px; font-size:14px; font-weight:500; border:none; border-bottom:2px solid transparent; background:transparent; cursor:pointer; color:var(--text-m); transition: color 0.2s; }
.tab-btn.active { color:var(--accent); border-bottom-color:var(--accent); }

/* stats */
.stat-card { background:var(--card); border:1px solid var(--border); border-radius:10px; padding:10px 16px; min-width:86px; flex-shrink:0; }

/* modal */
.modal-overlay { position:fixed; inset:0; background:rgba(80,70,60,0.45); backdrop-filter:blur(2px); z-index:200; display:flex; align-items:center; justify-content:center; padding:16px; }
.modal-box { background:var(--card); border:1px solid var(--border2); border-radius:16px; padding:24px; width:100%; max-width:580px; max-height:88vh; overflow-y:auto; box-shadow: 0 8px 40px rgba(0,0,0,0.12); }

/* misc */
mark { background:#ffe085; color:#5a3e00; border-radius:2px; padding:0 2px; }
.raw-block { background:var(--bg); border:1px solid var(--border); border-radius:8px; padding:12px; font-size:13px; color:var(--text-m); line-height:1.75; white-space:pre-wrap; word-break:break-all; }
.field-box  { background:var(--bg); border-radius:8px; padding:10px 12px; }
.field-label { font-size:11px; color:var(--text-s); margin-bottom:4px; }
.field-value { font-size:14px; font-weight:600; color:var(--text-h); }
.empty-state { text-align:center; padding:52px 0; color:var(--text-s); }
.divider { display:flex; align-items:center; gap:8px; margin:14px 0 12px; }
.divider span { font-size:11px; color:var(--text-s); white-space:nowrap; }
.divider::before,.divider::after { content:''; flex:1; height:1px; background:var(--border); }
.stats-row { display:flex; gap:10px; overflow-x:auto; padding-bottom:4px; margin-bottom:14px; }

.spinner { width:16px; height:16px; border:2px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin 0.7s linear infinite; display:inline-block; vertical-align:middle; }
@keyframes spin { to { transform:rotate(360deg); } }
.slide-in { animation:slideIn 0.22s ease; }
@keyframes slideIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
</style>
</head>
<body>

<!-- NAV -->
<header class="top-nav">
  <div style="max-width:780px;margin:0 auto;padding:0 16px;height:57px;display:flex;align-items:center;justify-content:space-between;">
    <div style="display:flex;align-items:center;gap:10px;">
      <div style="background:var(--accent-bg);border-radius:8px;padding:7px 10px;">
        <i class="fa-brands fa-weixin" style="color:var(--accent);font-size:17px;"></i>
      </div>
      <div>
        <div style="font-size:15px;font-weight:700;color:var(--text-h);letter-spacing:0.3px;">訊息管理系統</div>
        <div style="font-size:11px;color:var(--text-s);">微信訊息 · 智能整理</div>
      </div>
    </div>
    <button class="btn-ghost" style="font-size:13px;padding:7px 14px;display:flex;align-items:center;gap:6px;" onclick="openImport()">
      <i class="fa-solid fa-plus" style="font-size:11px;"></i> 匯入訊息
    </button>
  </div>
</header>

<!-- TABS -->
<div class="tab-bar">
  <div style="max-width:780px;margin:0 auto;padding:0 16px;display:flex;">
    <button id="tab-cust-btn" class="tab-btn active" onclick="switchTab('customer')">
      <i class="fa-solid fa-users" style="margin-right:5px;font-size:13px;"></i>客戶往來
    </button>
    <button id="tab-eng-btn" class="tab-btn" onclick="switchTab('engineer')">
      <i class="fa-solid fa-screwdriver-wrench" style="margin-right:5px;font-size:13px;"></i>工程師任務
    </button>
  </div>
</div>

<!-- MAIN -->
<main style="max-width:780px;margin:0 auto;padding:16px;">

  <!-- CUSTOMER -->
  <div id="tab-customer">
    <div style="display:flex;gap:8px;margin-bottom:12px;">
      <div style="flex:1;position:relative;">
        <i class="fa-solid fa-magnifying-glass" style="position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--text-s);font-size:13px;pointer-events:none;"></i>
        <input id="cust-search" class="input-field" style="padding-left:34px;" placeholder="搜尋公司、聯絡人、機型、任何關鍵字..." oninput="filterCustomer()" />
      </div>
      <select id="cust-company-filter" class="input-field" style="width:auto;min-width:96px;" onchange="filterCustomer()">
        <option value="">全部客戶</option>
      </select>
    </div>
    <div class="stats-row">
      <div class="stat-card"><div style="font-size:11px;color:var(--text-s);margin-bottom:2px;">總筆數</div><div id="sc-total" style="font-size:22px;font-weight:700;color:var(--text-h);">0</div></div>
      <div class="stat-card"><div style="font-size:11px;color:var(--text-s);margin-bottom:2px;">詢價中</div><div id="sc-inquiry" style="font-size:22px;font-weight:700;color:var(--amber);">0</div></div>
      <div class="stat-card"><div style="font-size:11px;color:var(--text-s);margin-bottom:2px;">確認中</div><div id="sc-confirm" style="font-size:22px;font-weight:700;color:var(--accent);">0</div></div>
      <div class="stat-card"><div style="font-size:11px;color:var(--text-s);margin-bottom:2px;">已簽訂</div><div id="sc-signed" style="font-size:22px;font-weight:700;color:var(--green);">0</div></div>
    </div>
    <div id="cust-records"></div>
  </div>

  <!-- ENGINEER -->
  <div id="tab-engineer" style="display:none;">
    <div style="display:flex;gap:8px;margin-bottom:12px;">
      <div style="flex:1;position:relative;">
        <i class="fa-solid fa-magnifying-glass" style="position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--text-s);font-size:13px;pointer-events:none;"></i>
        <input id="eng-search" class="input-field" style="padding-left:34px;" placeholder="搜尋主題、工程師、指示、任何關鍵字..." oninput="filterEngineer()" />
      </div>
      <select id="eng-status-filter" class="input-field" style="width:auto;min-width:88px;" onchange="filterEngineer()">
        <option value="">全部狀態</option>
        <option value="待處理">待處理</option>
        <option value="進行中">進行中</option>
        <option value="完成">完成</option>
      </select>
    </div>
    <div class="stats-row">
      <div class="stat-card"><div style="font-size:11px;color:var(--text-s);margin-bottom:2px;">總任務</div><div id="se-total" style="font-size:22px;font-weight:700;color:var(--text-h);">0</div></div>
      <div class="stat-card"><div style="font-size:11px;color:var(--text-s);margin-bottom:2px;">待處理</div><div id="se-pending" style="font-size:22px;font-weight:700;color:var(--text-m);">0</div></div>
      <div class="stat-card"><div style="font-size:11px;color:var(--text-s);margin-bottom:2px;">進行中</div><div id="se-ongoing" style="font-size:22px;font-weight:700;color:var(--amber);">0</div></div>
      <div class="stat-card"><div style="font-size:11px;color:var(--text-s);margin-bottom:2px;">完成</div><div id="se-done" style="font-size:22px;font-weight:700;color:var(--green);">0</div></div>
    </div>
    <div id="eng-records"></div>
  </div>

</main>

<!-- IMPORT MODAL -->
<div id="import-modal" class="modal-overlay" style="display:none;" onclick="handleOverlayClick(event)">
  <div class="modal-box slide-in">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;">
      <div style="font-size:16px;font-weight:700;color:var(--text-h);">
        <i class="fa-solid fa-file-import" style="color:var(--accent);margin-right:8px;"></i>匯入微信訊息
      </div>
      <button onclick="closeImport()" class="btn-ghost" style="padding:5px 10px;"><i class="fa-solid fa-xmark"></i></button>
    </div>

    <div style="font-size:12px;color:var(--text-m);margin-bottom:7px;">訊息類型</div>
    <div style="display:flex;gap:8px;margin-bottom:16px;">
      <button class="type-btn active" id="type-customer-btn" onclick="setMsgType('customer')"><i class="fa-solid fa-users" style="margin-right:4px;"></i>客戶訊息</button>
      <button class="type-btn" id="type-engineer-btn" onclick="setMsgType('engineer')"><i class="fa-solid fa-screwdriver-wrench" style="margin-right:4px;"></i>工程師任務</button>
    </div>

    <div class="divider"><span>方式一：貼入聊天記錄，AI 自動解析</span></div>

    <textarea id="paste-input" class="input-field" style="height:140px;margin-bottom:10px;font-size:13px;" placeholder="直接貼入整段微信聊天記錄（可含時間戳、多段對話）&#10;&#10;例如：&#10;王大明  10:32&#10;重庆方正有2台TM4，询单2周了，交期一直没给出来&#10;客户希望交期9、10内提供&#10;&#10;我  10:45&#10;好，我確認後回覆你"></textarea>

    <div style="display:flex;justify-content:flex-end;gap:8px;margin-bottom:14px;">
      <button class="btn-ghost" onclick="document.getElementById('paste-input').value=''">清空</button>
      <button class="btn-primary" id="parse-btn" onclick="parseMessage()">
        <i class="fa-solid fa-wand-magic-sparkles"></i> AI 解析並儲存
      </button>
    </div>

    <div id="parse-result" style="display:none;margin-bottom:14px;"></div>

    <!-- Worker URL -->
    <div id="worker-hint" style="background:var(--accent-bg);border:1px solid #b8d4f4;border-radius:8px;padding:10px 12px;margin-bottom:16px;font-size:12px;color:var(--accent);display:flex;gap:8px;align-items:flex-start;">
      <i class="fa-solid fa-circle-info" style="margin-top:1px;flex-shrink:0;"></i>
      <div style="width:100%;">
        AI 解析需設定 Cloudflare Worker 網址。請填入你的 Worker URL：
        <div style="margin-top:6px;display:flex;gap:6px;">
          <input id="worker-url-input" class="input-field" style="flex:1;font-size:12px;padding:6px 10px;" placeholder="https://your-worker.workers.dev" />
          <button class="btn-primary" style="padding:6px 12px;font-size:12px;" onclick="saveWorkerUrl()">儲存</button>
        </div>
      </div>
    </div>

    <div class="divider"><span>方式二：手動輸入</span></div>

    <!-- Customer form -->
    <div id="manual-customer-form">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;">
        <div><div style="font-size:12px;color:var(--text-m);margin-bottom:5px;">客戶公司 <span style="color:var(--red);">*</span></div><input id="m-company" class="input-field" placeholder="例：華通" /></div>
        <div><div style="font-size:12px;color:var(--text-m);margin-bottom:5px;">聯絡人 <span style="color:var(--red);">*</span></div><input id="m-contact" class="input-field" placeholder="例：王大明" /></div>
        <div><div style="font-size:12px;color:var(--text-m);margin-bottom:5px;">機型</div><input id="m-model" class="input-field" placeholder="例：TM四向光 A3" /></div>
        <div><div style="font-size:12px;color:var(--text-m);margin-bottom:5px;">數量</div><input id="m-qty" class="input-field" type="number" placeholder="例：500" /></div>
        <div><div style="font-size:12px;color:var(--text-m);margin-bottom:5px;">價格</div><input id="m-price" class="input-field" placeholder="例：NT$85/pcs" /></div>
        <div><div style="font-size:12px;color:var(--text-m);margin-bottom:5px;">交期</div><input id="m-delivery" class="input-field" placeholder="例：6/30" /></div>
        <div><div style="font-size:12px;color:var(--text-m);margin-bottom:5px;">日期</div><input id="m-date" class="input-field" type="date" /></div>
        <div><div style="font-size:12px;color:var(--text-m);margin-bottom:5px;">狀態</div>
          <select id="m-status" class="input-field"><option value="詢價中">詢價中</option><option value="確認中">確認中</option><option value="已簽訂">已簽訂</option></select>
        </div>
        <div style="grid-column:1/-1;"><div style="font-size:12px;color:var(--text-m);margin-bottom:5px;">備註</div><textarea id="m-note" class="input-field" style="height:56px;" placeholder="其他備註..."></textarea></div>
      </div>
      <div style="display:flex;justify-content:flex-end;"><button class="btn-primary" onclick="manualSaveCustomer()"><i class="fa-solid fa-floppy-disk"></i> 儲存</button></div>
    </div>

    <!-- Engineer form -->
    <div id="manual-engineer-form" style="display:none;">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;">
        <div style="grid-column:1/-1;"><div style="font-size:12px;color:var(--text-m);margin-bottom:5px;">主題 <span style="color:var(--red);">*</span></div><input id="e-topic" class="input-field" placeholder="例：TM四向光 — 光衰測試" /></div>
        <div><div style="font-size:12px;color:var(--text-m);margin-bottom:5px;">工程師 <span style="color:var(--red);">*</span></div><input id="e-engineer" class="input-field" placeholder="例：陳工" /></div>
        <div><div style="font-size:12px;color:var(--text-m);margin-bottom:5px;">日期</div><input id="e-date" class="input-field" type="date" /></div>
        <div style="grid-column:1/-1;"><div style="font-size:12px;color:var(--text-m);margin-bottom:5px;">指示內容</div><textarea id="e-instruction" class="input-field" style="height:60px;" placeholder="給工程師的指示..."></textarea></div>
        <div style="grid-column:1/-1;"><div style="font-size:12px;color:var(--text-m);margin-bottom:5px;">回報進度</div><textarea id="e-progress" class="input-field" style="height:60px;" placeholder="工程師回報內容..."></textarea></div>
        <div><div style="font-size:12px;color:var(--text-m);margin-bottom:5px;">狀態</div>
          <select id="e-status" class="input-field"><option value="待處理">待處理</option><option value="進行中">進行中</option><option value="完成">完成</option></select>
        </div>
      </div>
      <div style="display:flex;justify-content:flex-end;"><button class="btn-primary" onclick="manualSaveEngineer()"><i class="fa-solid fa-floppy-disk"></i> 儲存</button></div>
    </div>
  </div>
</div>

<!-- DETAIL MODAL -->
<div id="detail-modal" class="modal-overlay" style="display:none;" onclick="handleDetailOverlay(event)">
  <div class="modal-box slide-in" id="detail-content-box"></div>
</div>

<script>
var WORKER_URL = localStorage.getItem('workerUrl') || 'https://withered-sound-43b8.michelle-chang.workers.dev';

function saveWorkerUrl(){
  var v = document.getElementById('worker-url-input').value.trim().replace(/\/$/,'');
  if(!v) return;
  WORKER_URL = v;
  localStorage.setItem('workerUrl', v);
  document.getElementById('worker-hint').style.background='#d4f0e2';
  document.getElementById('worker-hint').style.borderColor='#a0d8b8';
  document.getElementById('worker-hint').innerHTML=
    '<i class="fa-solid fa-circle-check" style="color:#1a7a4a;flex-shrink:0;"></i>'
    +'<span style="color:#1a7a4a;font-size:12px;">Worker 已設定：'+v
    +'&nbsp;<button onclick="resetWorkerUrl()" style="background:none;border:none;color:var(--text-m);font-size:12px;cursor:pointer;text-decoration:underline;">重設</button></span>';
}
function resetWorkerUrl(){ WORKER_URL=''; localStorage.removeItem('workerUrl'); location.reload(); }

var custData = [
  {id:1,company:'華通',contact:'王大明',date:'2024-06-10',model:'TM四向光 A3',qty:500,price:'NT$85/pcs',delivery:'6/30',status:'確認中',note:'',raw:'王大明  10:32\nTM四向光A3 500pcs 報價NT$85 交期6/30\n\n我  10:45\n好，確認後回覆',tags:['四向光','報價','A3']},

function hl(text,q){
  if(!q||!text) return String(text||'');
  return String(text).replace(new RegExp('('+q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi'),'<mark>$1</mark>');
}
function escH(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

async function parseMessage(){
  var text=document.getElementById('paste-input').value.trim();
  if(!text){alert('請先貼入微信聊天記錄');return;}
  if(!WORKER_URL){alert('請先填入 Cloudflare Worker 網址（匯入視窗藍色提示框）');return;}

  var resultEl=document.getElementById('parse-result');

  btn.innerHTML='<span class="spinner"></span> AI 解析中...';
  resultEl.style.display='block';
  resultEl.innerHTML='<div style="background:var(--accent-bg);border:1px solid #b8d4f4;border-radius:10px;padding:12px 14px;font-size:13px;color:var(--accent);display:flex;align-items:center;gap:8px;"><span class="spinner"></span> Claude 正在理解你的訊息，請稍候...</div>';

    ?'你是訊息解析助理。仔細閱讀以下微信聊天記錄，提取所有可識別的資訊，回傳純JSON（不含markdown）包含：company(客戶公司名稱，若不確定填null), contact(聯絡人/發話者姓名), date(最近日期YYYY-MM-DD，若無填今天), model(機型或產品名稱，若有), qty(數量純數字，若有), price(價格含單位，若有), delivery(交期描述，若有), status(詢價中/確認中/已簽訂 三選一，依語意判斷), note(重要備註), raw(原始訊息完整文字), tags(2至4個關鍵標籤陣列)。'
    :'你是訊息解析助理。仔細閱讀以下微信聊天記錄，回傳純JSON（不含markdown）包含：topic(任務主題，格式"產品或系統 — 具體事項"), engineer(工程師或負責人名稱), date(最近日期YYYY-MM-DD，若無填今天), instruction(指示或要求內容), progress(回報或進度，若無填"尚未回報"), status(待處理/進行中/完成 三選一，依語意判斷), tags(2至4個關鍵標籤陣列)。';
  try{
    var resp=await fetch(WORKER_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1200,system:systemPrompt,messages:[{role:'user',content:text}]})});
    var data=await resp.json();
    if(data.error) throw new Error(data.error.message||JSON.stringify(data.error));

      custData.unshift(parsed);
      resultEl.innerHTML='<div style="background:var(--green-bg);border:1px solid #a0d8b8;border-radius:10px;padding:12px 14px;"><div style="font-size:13px;font-weight:600;color:var(--green);margin-bottom:8px;"><i class="fa-solid fa-circle-check" style="margin-right:5px;"></i>解析成功，已加入「客戶往來」</div><div style="display:flex;flex-wrap:wrap;gap:5px;">'
        +(parsed.company?'<span class="badge badge-blue">'+escH(parsed.company)+'</span>':'')

        +(parsed.delivery?'<span class="badge badge-amber">交期 '+escH(parsed.delivery)+'</span>':'')
        +'</div></div>';

      resultEl.innerHTML='<div style="background:var(--green-bg);border:1px solid #a0d8b8;border-radius:10px;padding:12px 14px;"><div style="font-size:13px;font-weight:600;color:var(--green);margin-bottom:8px;"><i class="fa-solid fa-circle-check" style="margin-right:5px;"></i>解析成功，已加入「工程師任務」</div><div style="display:flex;flex-wrap:wrap;gap:5px;">'
        +(parsed.topic?'<span class="badge badge-blue">'+escH(parsed.topic)+'</span>':'')
        +(parsed.engineer?'<span class="badge badge-gray">'+escH(parsed.engineer)+'</span>':'')
        +(parsed.status?'<span class="badge badge-amber">'+escH(parsed.status)+'</span>':'')
        +'</div></div>';
      document.getElementById('paste-input').value='';
      if(currentTab==='engineer') renderEngineer(engData);

  }
}

  if(!company||!contact){alert('請填入客戶公司與聯絡人');return;}
  custData.unshift({id:Date.now(),company:company,contact:contact,date:document.getElementById('m-date').value,model:document.getElementById('m-model').value.trim(),qty:parseInt(document.getElementById('m-qty').value)||null,price:document.getElementById('m-price').value.trim(),delivery:document.getElementById('m-delivery').value.trim(),status:document.getElementById('m-status').value,note:document.getElementById('m-note').value.trim(),raw:'',tags:[]});
  if(currentTab==='customer') renderCustomer(custData);
  ['m-company','m-contact','m-model','m-qty','m-price','m-delivery','m-note'].forEach(function(id){document.getElementById(id).value='';});
  closeImport();
}
function manualSaveEngineer(){
  var topic=document.getElementById('e-topic').value.trim();
  var engineer=document.getElementById('e-engineer').value.trim();
  if(!topic||!engineer){alert('請填入主題與工程師');return;}
  engData.unshift({id:Date.now(),topic:topic,engineer:engineer,date:document.getElementById('e-date').value,instruction:document.getElementById('e-instruction').value.trim(),progress:document.getElementById('e-progress').value.trim()||'尚未回報',status:document.getElementById('e-status').value,tags:[]});
  if(currentTab==='engineer') renderEngineer(engData);
  ['e-topic','e-engineer','e-instruction','e-progress'].forEach(function(id){document.getElementById(id).value='';});
  closeImport();
}
</script>
