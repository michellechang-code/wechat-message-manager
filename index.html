<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>訊息管理系統</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet" />
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*{font-family:'Noto Sans TC',sans-serif;box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#f0ede8;--surface:#e8e4de;--card:#faf8f5;--border:#d4cfc8;--border2:#c8c2bb;
  --accent:#3b76d4;--accent-bg:#deeaf8;
  --text-h:#1a1a1a;--text-b:#3d3d3d;--text-m:#7a7570;--text-s:#a09990;
  --green:#1a7a4a;--green-bg:#d4f0e2;--amber:#8a5a00;--amber-bg:#fdedc8;
  --teal:#0d6e6e;--teal-bg:#cceeee;--red:#b03030;--red-bg:#fde0e0;
}
body{background:var(--bg);color:var(--text-b);min-height:100vh;}
::-webkit-scrollbar{width:5px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}

/* ── Login ── */
#login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:16px;}
.login-box{background:var(--card);border:1px solid var(--border2);border-radius:20px;padding:40px 36px;width:100%;max-width:400px;box-shadow:0 8px 40px rgba(0,0,0,0.10);}

/* ── Layout ── */
.top-nav{background:var(--surface);border-bottom:1px solid var(--border2);position:sticky;top:0;z-index:50;}
.tab-bar{background:var(--surface);border-bottom:1px solid var(--border2);position:sticky;top:57px;z-index:40;}
.tab-btn{padding:12px 20px;font-size:14px;font-weight:500;border:none;border-bottom:2px solid transparent;background:transparent;cursor:pointer;color:var(--text-m);transition:color 0.2s;}
.tab-btn.active{color:var(--accent);border-bottom-color:var(--accent);}

/* ── Cards ── */
.msg-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px 16px;margin-bottom:10px;transition:border-color 0.2s,box-shadow 0.2s,transform 0.15s;}
.msg-card:hover{border-color:var(--accent);box-shadow:0 2px 14px rgba(59,118,212,0.10);transform:translateY(-1px);}

/* 客戶群組卡片 */
.company-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:0;margin-bottom:14px;overflow:hidden;}
.company-header{background:var(--surface);padding:12px 16px;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--border);}
.model-block{padding:14px 16px;border-bottom:1px solid var(--border);}
.model-block:last-child{border-bottom:none;}
.record-row{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px 12px;margin-top:8px;font-size:12px;}

/* ── Badges ── */
.badge{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:500;padding:2px 8px;border-radius:9999px;}
.badge-blue{background:var(--accent-bg);color:var(--accent);}
.badge-green{background:var(--green-bg);color:var(--green);}
.badge-amber{background:var(--amber-bg);color:var(--amber);}
.badge-gray{background:#e8e4de;color:#5a5550;border:1px solid var(--border);}
.badge-teal{background:var(--teal-bg);color:var(--teal);}
.badge-red{background:var(--red-bg);color:var(--red);}
.badge-wechat{background:#e8f4e8;color:#1a7a4a;border-radius:4px;padding:2px 7px;font-size:11px;font-weight:600;}
.badge-crm{background:var(--green-bg);color:var(--green);border-radius:4px;padding:2px 7px;font-size:11px;font-weight:600;}
.badge-confirmed{background:#d4f0e2;color:#1a7a4a;}
.badge-ongoing{background:#fdedc8;color:#8a5a00;}
.badge-lost{background:#fde0e0;color:#b03030;}
.badge-unknown{background:#e8e4de;color:#7a7570;}

/* ── Inputs ── */
.input-field{background:var(--card);border:1px solid var(--border);color:var(--text-b);border-radius:8px;padding:8px 12px;font-size:14px;width:100%;outline:none;transition:border-color 0.2s,box-shadow 0.2s;}
.input-field:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(59,118,212,0.1);}
.input-field::placeholder{color:var(--text-s);}
select.input-field option{background:var(--card);color:var(--text-b);}
textarea.input-field{resize:none;line-height:1.7;}
.filter-input{background:var(--card);border:1px solid var(--border);color:var(--text-b);border-radius:8px;padding:7px 10px;font-size:13px;width:100%;outline:none;transition:border-color 0.2s;}
.filter-input:focus{border-color:var(--accent);}
.filter-input::placeholder{color:var(--text-s);}
.filter-label{font-size:11px;color:var(--text-m);margin-bottom:4px;font-weight:500;letter-spacing:0.3px;}

/* ── Buttons ── */
.btn-primary{background:var(--accent);color:#fff;border:none;border-radius:8px;padding:9px 18px;font-size:14px;font-weight:500;cursor:pointer;transition:background 0.2s,transform 0.1s;display:inline-flex;align-items:center;gap:6px;}
.btn-primary:hover{background:#2a62c0;}
.btn-primary:active{transform:scale(0.97);}
.btn-primary:disabled{opacity:0.5;cursor:not-allowed;}
.btn-ghost{background:transparent;color:var(--text-m);border:1px solid var(--border);border-radius:8px;padding:7px 14px;font-size:13px;cursor:pointer;transition:background 0.2s,color 0.2s;}
.btn-ghost:hover{background:var(--border);color:var(--text-b);}
.del-btn{background:none;border:none;cursor:pointer;color:var(--text-s);padding:3px 5px;border-radius:4px;font-size:12px;transition:color 0.15s;}
.del-btn:hover{color:var(--red);}
.type-btn{padding:5px 14px;font-size:12px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--text-m);cursor:pointer;transition:all 0.2s;}
.type-btn.active{background:var(--accent-bg);color:var(--accent);border-color:var(--accent);}

/* ── Misc ── */
.filter-panel{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px 16px;margin-bottom:14px;}
.stats-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:4px;}
.stat-pill{background:var(--bg);border:1px solid var(--border);border-radius:20px;padding:4px 12px;font-size:12px;color:var(--text-m);white-space:nowrap;}
.stat-pill b{font-weight:700;}
.modal-overlay{position:fixed;inset:0;background:rgba(80,70,60,0.45);backdrop-filter:blur(2px);z-index:200;display:flex;align-items:center;justify-content:center;padding:16px;}
.modal-box{background:var(--card);border:1px solid var(--border2);border-radius:16px;padding:24px;width:100%;max-width:580px;max-height:88vh;overflow-y:auto;box-shadow:0 8px 40px rgba(0,0,0,0.12);}
.empty-state{text-align:center;padding:52px 0;color:var(--text-s);}
.divider{display:flex;align-items:center;gap:8px;margin:14px 0 12px;}
.divider span{font-size:11px;color:var(--text-s);white-space:nowrap;}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border);}
.spinner{width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.7s linear infinite;display:inline-block;vertical-align:middle;}
@keyframes spin{to{transform:rotate(360deg);}}
.slide-in{animation:slideIn 0.22s ease;}
@keyframes slideIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
mark{background:#ffe085;color:#5a3e00;border-radius:2px;padding:0 2px;}
.raw-block{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:12px;font-size:13px;color:var(--text-m);line-height:1.75;white-space:pre-wrap;word-break:break-all;}
.status-dot{width:6px;height:6px;border-radius:50%;display:inline-block;}
.dot-green{background:var(--green);}
.dot-amber{background:#c07800;}
.dot-gray{background:var(--text-s);}

/* 統計區 */
.stat-summary-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:10px;}
</style>
</head>
<body>

<!-- ══ LOGIN ══ -->
<div id="login-screen">
  <div class="login-box">
    <div style="text-align:center;margin-bottom:28px;">
      <div style="background:var(--accent-bg);border-radius:12px;padding:12px;display:inline-block;margin-bottom:12px;">
        <i class="fa-brands fa-weixin" style="color:var(--accent);font-size:28px;"></i>
      </div>
      <div style="font-size:20px;font-weight:700;color:var(--text-h);">訊息管理系統</div>
      <div style="font-size:12px;color:var(--text-s);margin-top:4px;">請登入以繼續</div>
    </div>
    <div style="margin-bottom:14px;">
      <div class="filter-label" style="margin-bottom:6px;">Email</div>
      <input id="login-email" class="input-field" type="email" placeholder="your@email.com" />
    </div>
    <div style="margin-bottom:20px;">
      <div class="filter-label" style="margin-bottom:6px;">密碼</div>
      <input id="login-password" class="input-field" type="password" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()" />
    </div>
    <button class="btn-primary" style="width:100%;justify-content:center;" onclick="doLogin()" id="login-btn">
      <i class="fa-solid fa-right-to-bracket"></i> 登入
    </button>
    <div id="login-error" style="display:none;margin-top:12px;background:var(--red-bg);border:1px solid #f0b8b8;border-radius:8px;padding:10px;font-size:13px;color:var(--red);text-align:center;"></div>
  </div>
</div>

<!-- ══ MAIN APP ══ -->
<div id="app" style="display:none;">

<!-- NAV -->
<header class="top-nav">
  <div style="max-width:900px;margin:0 auto;padding:0 16px;height:57px;display:flex;align-items:center;justify-content:space-between;">
    <div style="display:flex;align-items:center;gap:10px;">
      <div style="background:var(--accent-bg);border-radius:8px;padding:7px 10px;">
        <i class="fa-brands fa-weixin" style="color:var(--accent);font-size:17px;"></i>
      </div>
      <div>
        <div style="font-size:15px;font-weight:700;color:var(--text-h);">訊息管理系統</div>
        <div style="font-size:11px;color:var(--text-s);" id="nav-user-info">載入中...</div>
      </div>
    </div>
    <div style="display:flex;gap:8px;align-items:center;">
      <button class="btn-ghost" style="font-size:13px;padding:7px 14px;display:flex;align-items:center;gap:6px;" onclick="openExcelImport()" id="btn-excel-import">
        <i class="fa-solid fa-file-excel" style="font-size:11px;color:#1a7a4a;"></i> 匯入 Excel
      </button>
      <button class="btn-ghost" style="font-size:13px;padding:7px 14px;display:flex;align-items:center;gap:6px;" onclick="openImport()">
        <i class="fa-solid fa-plus" style="font-size:11px;"></i> 匯入訊息
      </button>
      <button class="btn-ghost" style="font-size:13px;padding:6px 10px;" onclick="doLogout()" title="登出">
        <i class="fa-solid fa-right-from-bracket"></i>
      </button>
    </div>
  </div>
</header>

<!-- TABS -->
<div class="tab-bar">
  <div style="max-width:900px;margin:0 auto;padding:0 16px;display:flex;">
    <button id="tab-cust-btn" class="tab-btn active" onclick="switchTab('customer')">
      <i class="fa-solid fa-handshake" style="margin-right:5px;font-size:13px;"></i>客戶商務
    </button>
    <button id="tab-stat-btn" class="tab-btn" onclick="switchTab('stats')">
      <i class="fa-solid fa-chart-bar" style="margin-right:5px;font-size:13px;"></i>需求統計
    </button>
    <button id="tab-eng-btn" class="tab-btn" onclick="switchTab('engineer')">
      <i class="fa-solid fa-gears" style="margin-right:5px;font-size:13px;"></i>設備／技術
    </button>
  </div>
</div>

<main style="max-width:900px;margin:0 auto;padding:16px;">

  <!-- ══ 客戶商務 ══ -->
  <div id="tab-customer">
    <div class="stats-row" id="unified-stats-row" style="margin-bottom:12px;"></div>
    <div class="filter-panel">
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;">
        <div>
          <div class="filter-label"><i class="fa-regular fa-building" style="margin-right:3px;"></i>客戶公司（模糊搜尋）</div>
          <input id="f-uni-company" class="filter-input" placeholder="例：龍南、無錫..." oninput="renderUnified()" />
        </div>
        <div>
          <div class="filter-label"><i class="fa-solid fa-microchip" style="margin-right:3px;"></i>機型</div>
          <input id="f-uni-model" class="filter-input" placeholder="例：RU6HM、TM4..." oninput="renderUnified()" />
        </div>
        <div>
          <div class="filter-label"><i class="fa-solid fa-user-tie" style="margin-right:3px;"></i>業務／聯絡人</div>
          <input id="f-uni-person" class="filter-input" placeholder="例：陳曉、王大明..." oninput="renderUnified()" />
        </div>
      </div>
      <div style="margin-top:10px;position:relative;">
        <i class="fa-solid fa-magnifying-glass" style="position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text-s);font-size:13px;pointer-events:none;"></i>
        <input id="f-uni-keyword" class="filter-input" style="padding-left:32px;" placeholder="全文關鍵字搜尋（同時搜微信訊息＋CRM資料）..." oninput="renderUnified()" />
      </div>
      <div style="display:flex;justify-content:flex-end;margin-top:8px;">
        <button class="btn-ghost" style="font-size:12px;padding:5px 12px;" onclick="clearUnifiedFilter()">
          <i class="fa-solid fa-rotate-left" style="font-size:11px;margin-right:3px;"></i>清除篩選
        </button>
      </div>
    </div>
    <div id="unified-records"></div>
  </div>

  <!-- ══ 需求統計 ══ -->
  <div id="tab-stats" style="display:none;">
    <div class="filter-panel">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
        <div>
          <div class="filter-label"><i class="fa-solid fa-microchip" style="margin-right:3px;"></i>機型</div>
          <input id="f-stat-model" class="filter-input" placeholder="例：RU6HM、DG6ZM..." oninput="renderStats()" />
        </div>
        <div>
          <div class="filter-label"><i class="fa-regular fa-calendar" style="margin-right:3px;"></i>需求月份</div>
          <input id="f-stat-month" class="filter-input" placeholder="例：6月、2026/7、Q3..." oninput="renderStats()" />
        </div>
      </div>
    </div>
    <div id="stats-records"></div>
  </div>

  <!-- ══ 設備/技術 ══ -->
  <div id="tab-engineer" style="display:none;">
    <div class="stats-row" id="eng-stats-row" style="margin-bottom:12px;"></div>
    <div class="filter-panel">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
        <div>
          <div class="filter-label"><i class="fa-regular fa-building" style="margin-right:3px;"></i>對應客戶</div>
          <input id="f-eng-company" class="filter-input" placeholder="例：華通..." oninput="renderEngineer()" />
        </div>
        <div>
          <div class="filter-label"><i class="fa-solid fa-microchip" style="margin-right:3px;"></i>機型</div>
          <input id="f-eng-model" class="filter-input" placeholder="例：TM4、CCD..." oninput="renderEngineer()" />
        </div>
        <div>
          <div class="filter-label"><i class="fa-solid fa-flask" style="margin-right:3px;"></i>測試項目</div>
          <input id="f-eng-test" class="filter-input" placeholder="例：光衰、良率、公差..." oninput="renderEngineer()" />
        </div>
        <div>
          <div class="filter-label"><i class="fa-solid fa-triangle-exclamation" style="margin-right:3px;"></i>異常問題</div>
          <input id="f-eng-issue" class="filter-input" placeholder="例：過熱、尺寸偏差..." oninput="renderEngineer()" />
        </div>
      </div>
      <div style="margin-top:10px;position:relative;">
        <i class="fa-solid fa-magnifying-glass" style="position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text-s);font-size:13px;pointer-events:none;"></i>
        <input id="f-eng-keyword" class="filter-input" style="padding-left:32px;" placeholder="全文關鍵字搜尋..." oninput="renderEngineer()" />
      </div>
      <div style="display:flex;justify-content:flex-end;margin-top:8px;">
        <button class="btn-ghost" style="font-size:12px;padding:5px 12px;" onclick="clearEngFilter()">
          <i class="fa-solid fa-rotate-left" style="font-size:11px;margin-right:3px;"></i>清除篩選
        </button>
      </div>
    </div>
    <div id="eng-records"></div>
  </div>

</main>
</div><!-- end #app -->

<!-- ══ IMPORT MODAL ══ -->
<div id="import-modal" class="modal-overlay" style="display:none;" onclick="if(event.target===this)closeImport()">
  <div class="modal-box slide-in">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;">
      <div style="font-size:16px;font-weight:700;color:var(--text-h);">
        <i class="fa-solid fa-file-import" style="color:var(--accent);margin-right:8px;"></i>匯入訊息
      </div>
      <button onclick="closeImport()" class="btn-ghost" style="padding:5px 10px;"><i class="fa-solid fa-xmark"></i></button>
    </div>
    <div style="font-size:12px;color:var(--text-m);margin-bottom:7px;">訊息類型</div>
    <div style="display:flex;gap:8px;margin-bottom:16px;">
      <button class="type-btn active" id="type-customer-btn" onclick="setMsgType('customer')"><i class="fa-solid fa-handshake" style="margin-right:4px;"></i>客戶商務</button>
      <button class="type-btn" id="type-engineer-btn" onclick="setMsgType('engineer')"><i class="fa-solid fa-gears" style="margin-right:4px;"></i>設備／技術</button>
    </div>
    <div class="divider"><span>方式一：貼入聊天記錄，AI 自動解析</span></div>
    <textarea id="paste-input" class="input-field" style="height:140px;margin-bottom:10px;font-size:13px;"
      placeholder="直接貼入整段微信聊天記錄&#10;例：&#10;王大明  10:32&#10;重庆方正2台TM4，交期9月"></textarea>
    <div style="display:flex;justify-content:flex-end;gap:8px;margin-bottom:14px;">
      <button class="btn-ghost" onclick="document.getElementById('paste-input').value=''">清空</button>
      <button class="btn-primary" id="parse-btn" onclick="parseMessage()">
        <i class="fa-solid fa-wand-magic-sparkles"></i> AI 解析並儲存
      </button>
    </div>
    <div id="parse-result" style="display:none;margin-bottom:14px;"></div>
    <div class="divider"><span>方式二：手動輸入</span></div>
    <!-- 客戶商務表單 -->
    <div id="manual-customer-form">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;">
        <div><div style="font-size:12px;color:var(--text-m);margin-bottom:5px;">客戶公司 *</div><input id="m-company" class="input-field" placeholder="例：華通" /></div>
        <div><div style="font-size:12px;color:var(--text-m);margin-bottom:5px;">聯絡人 *</div><input id="m-contact" class="input-field" placeholder="例：王大明" /></div>
        <div><div style="font-size:12px;color:var(--text-m);margin-bottom:5px;">機型</div><input id="m-model" class="input-field" placeholder="例：RU6HM" /></div>
        <div><div style="font-size:12px;color:var(--text-m);margin-bottom:5px;">數量（台）</div><input id="m-qty" class="input-field" type="number" placeholder="例：2" /></div>
        <div><div style="font-size:12px;color:var(--text-m);margin-bottom:5px;">價格</div><input id="m-price" class="input-field" placeholder="例：NT$85萬" /></div>
        <div><div style="font-size:12px;color:var(--text-m);margin-bottom:5px;">交期</div><input id="m-delivery" class="input-field" placeholder="例：2026/9" /></div>
        <div><div style="font-size:12px;color:var(--text-m);margin-bottom:5px;">日期</div><input id="m-date" class="input-field" type="date" /></div>
        <div><div style="font-size:12px;color:var(--text-m);margin-bottom:5px;">狀態</div>
          <select id="m-status" class="input-field"><option value="進行中">進行中</option><option value="已確認">已確認</option><option value="流失">流失/結案</option></select>
        </div>
        <div style="grid-column:1/-1;"><div style="font-size:12px;color:var(--text-m);margin-bottom:5px;">備註</div><textarea id="m-note" class="input-field" style="height:56px;" placeholder="其他備註..."></textarea></div>
      </div>
      <div style="display:flex;justify-content:flex-end;"><button class="btn-primary" onclick="manualSaveCustomer()"><i class="fa-solid fa-floppy-disk"></i> 儲存</button></div>
    </div>
    <!-- 設備技術表單 -->
    <div id="manual-engineer-form" style="display:none;">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;">
        <div style="grid-column:1/-1;"><div style="font-size:12px;color:var(--text-m);margin-bottom:5px;">主題 *</div><input id="e-topic" class="input-field" placeholder="例：TM四向光 — 光衰測試" /></div>

// ══ 繁簡轉換 ════════════════════════════════════════════════
var T2S={'紅':'红','藍':'蓝','綠':'绿','黃':'黄','來':'来','對':'对','國':'国','時':'时','問':'问','訊':'讯','數':'数','機':'机','號':'号','線':'线','電':'电','頭':'头','樣':'样','廠':'厂','點':'点','單':'单','貨':'货','業':'业','發':'发','設':'设','備':'备','確':'确','認':'认','銷':'销','產':'产','術':'术','應':'应','標':'标','準':'准','聯':'联','強':'强','價':'价','請':'请','測':'测','試':'试','結':'结','過':'过','進':'进','記':'记','開':'开','關':'关','顯':'显','燈':'灯','統':'统','碼':'码','節':'节','體':'体','資':'资','訂':'订','詢':'询','報':'报','傳':'传','轉':'转','驗':'验','達':'达','導':'导','態':'态','萬':'万','這':'这','後':'后','們':'们','個':'个','為':'为','說':'说','來':'来','會':'会','當':'当','無':'无','與':'与','給':'给','讓':'让','兩':'两','點':'点','時':'时','間':'间','問':'问','題':'题','師':'师','圖':'图','複':'复','繼':'继','續':'续','雙':'双','規':'规','裝':'装'};
var S2T={};
Object.keys(T2S).forEach(function(t){S2T[T2S[t]]=t;});
function toS(s){return String(s||'').split('').map(function(c){return T2S[c]||c;}).join('');}
function toT(s){return String(s||'').split('').map(function(c){return S2T[c]||c;}).join('');}
function norm(s){var v=String(s||'').toLowerCase();return v+' '+toS(v)+' '+toT(v);}
function matchQ(hay,q){if(!q)return true;var n=q.toLowerCase();var h=norm(hay);return h.indexOf(n)>-1||h.indexOf(toS(n))>-1||h.indexOf(toT(n))>-1;}
function hl(text,q){
  if(!q||!text) return escH(String(text||''));
  var variants=[q,toS(q),toT(q)].filter(function(v,i,a){return a.indexOf(v)===i&&v;});
  var result=escH(String(text));
  variants.forEach(function(v){result=result.replace(new RegExp('('+v.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi'),'<mark>$1</mark>');});
  return result;
}
function escH(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

// ══ 狀態判斷 ════════════════════════════════════════════════
function classifyStatus(text){
  if(!text) return 'unknown';
  var t=norm(text);
  var confirmed=['合约','合約','用印','已出货','已出貨','已下单','已下單','订单','訂單','出货','出貨'];
  var lost=['结案','結案','取消','竞争对手','競爭對手','对手','對手','流失'];
  for(var i=0;i<confirmed.length;i++){if(t.indexOf(confirmed[i])>-1||t.indexOf(toS(confirmed[i]))>-1) return 'confirmed';}
  for(var j=0;j<lost.length;j++){if(t.indexOf(lost[j])>-1||t.indexOf(toS(lost[j]))>-1) return 'lost';}
  return 'ongoing';
}
var statusLabel={'confirmed':'✅ 已確認','ongoing':'🔄 進行中','lost':'❌ 流失/結案','unknown':'⚠️ 不明'};
var statusBadgeCls={'confirmed':'badge-confirmed','ongoing':'badge-ongoing','lost':'badge-lost','unknown':'badge-unknown'};

// ══ 客戶商務：統一渲染（客戶→機型 群組展開）══════════════
function clearUnifiedFilter(){
  ['f-uni-company','f-uni-model','f-uni-person','f-uni-keyword'].forEach(function(id){
    var el=document.getElementById(id);if(el)el.value='';
  });
  renderUnified();
}

function renderUnified(){
  var company=(document.getElementById('f-uni-company')||{}).value||'';
  var model=(document.getElementById('f-uni-model')||{}).value||'';
  var person=(document.getElementById('f-uni-person')||{}).value||'';
  var keyword=(document.getElementById('f-uni-keyword')||{}).value||'';
  var q=company||model||person||keyword;

  // 篩選微信
  var fCust=custData.filter(function(r){
    if(company&&!matchQ(r.company,company)) return false;
    if(model&&!matchQ([r.model,r.raw].join(' '),model)) return false;
    if(person&&!matchQ([r.contact,r.raw].join(' '),person)) return false;
    if(keyword&&!matchQ([r.company,r.contact,r.model,r.price,r.delivery,r.status,r.note,r.raw].join(' '),keyword)) return false;
    return true;
  });
  // 篩選CRM
  var fCRM=crmData.filter(function(r){
    if(company&&!matchQ(r.customer,company)) return false;
    if(model&&!matchQ([r.model,r.status_w1,r.status_w2].join(' '),model)) return false;
    if(person&&!matchQ(r.sales,person)) return false;
    if(keyword&&!matchQ([r.customer,r.sales,r.model,r.delivery,r.status_w1,r.status_w2].join(' '),keyword)) return false;
    return true;
  });

  // 統計列
  var statsEl=document.getElementById('unified-stats-row');
  if(statsEl){
    statsEl.innerHTML=
      '<span class="stat-pill">微信訊息 <b>'+custData.length+'</b></span>'
      +'<span class="stat-pill">CRM筆數 <b>'+crmData.length+'</b></span>'
      +(q?'<span class="stat-pill" style="color:var(--accent);border-color:var(--accent);">篩選：微信<b>'+fCust.length+'</b> CRM<b>'+fCRM.length+'</b></span>':'');
  }

  var el=document.getElementById('unified-records');
  if(!el) return;
  if(!fCust.length&&!fCRM.length){
    el.innerHTML='<div class="empty-state"><i class="fa-solid fa-inbox" style="font-size:36px;display:block;margin-bottom:12px;"></i>查無符合紀錄</div>';
    return;
  }

  // 群組化：以客戶名稱為 key
  var groups={};
  fCust.forEach(function(r){
    var key=r.company||'（未知客戶）';
    if(!groups[key]) groups[key]={name:key,models:{}};
    var mk=r.model||'（未知機型）';
    if(!groups[key].models[mk]) groups[key].models[mk]={model:mk,records:[]};
    groups[key].models[mk].records.push(Object.assign({},r,{_type:'wechat'}));
  });
  fCRM.forEach(function(r){
    var key=r.customer||'（未知客戶）';
    if(!groups[key]) groups[key]={name:key,models:{}};
    var mk=r.model||'（未知機型）';
    if(!groups[key].models[mk]) groups[key].models[mk]={model:mk,records:[]};
    groups[key].models[mk].records.push(Object.assign({},r,{_type:'crm'}));
  });

  // 排序：客戶名稱字母順序
  var sortedCompanies=Object.keys(groups).sort();

  el.innerHTML=sortedCompanies.map(function(companyName){
    var group=groups[companyName];
    var modelKeys=Object.keys(group.models).sort();

    var modelsHtml=modelKeys.map(function(mk){
      var mGroup=group.models[mk];
      var records=mGroup.records;
      // 依時間排序（最新在前）
      records.sort(function(a,b){
        var da=a._type==='wechat'?a.date:a.week_w2||a.week_w1||'';
        var db=b._type==='wechat'?b.date:b.week_w2||b.week_w1||'';
        return (db||'').localeCompare(da||'');
      });

      var recordsHtml=records.map(function(r){
        if(r._type==='wechat'){
          var sc=classifyStatus(r.status);
          return '<div class="record-row">'
            +'<div style="display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap;">'
              +'<div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;">'
                +'<span class="badge-wechat"><i class="fa-brands fa-weixin" style="margin-right:3px;"></i>微信</span>'
                +(r.contact?'<span style="font-size:12px;color:var(--text-m);"><i class="fa-regular fa-user" style="font-size:10px;margin-right:2px;"></i>'+escH(r.contact)+'</span>':'')
                +'<span style="font-size:11px;color:var(--text-s);">'+escH(r.date||'')+'</span>'
                +(r.delivery?'<span class="badge badge-amber" style="font-size:10px;"><i class="fa-regular fa-calendar" style="font-size:9px;"></i> '+escH(r.delivery)+'</span>':'')
                +(r.qty?'<span class="badge badge-gray" style="font-size:10px;">'+escH(String(r.qty))+' 台</span>':'')
                +(r.price&&r.price!=='—'?'<span class="badge badge-green" style="font-size:10px;">'+escH(r.price)+'</span>':'')
              +'</div>'
              +'<div style="display:flex;align-items:center;gap:6px;">'
                +'<span class="badge '+statusBadgeCls[sc]+'" style="font-size:10px;">'+statusLabel[sc]+'</span>'
                +(canDelete(r)?'<button class="del-btn" onclick="deleteCustRecord(\''+r.id+'\')" title="刪除"><i class="fa-solid fa-trash-can"></i></button>':'')
              +'</div>'
            +'</div>'
            +(r.raw?'<div style="font-size:12px;color:var(--text-s);margin-top:6px;line-height:1.6;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;">'+hl(r.raw,q)+'</div>':'')
            +(r.note?'<div style="font-size:12px;color:var(--text-m);margin-top:4px;"><i class="fa-solid fa-note-sticky" style="font-size:10px;margin-right:3px;"></i>'+escH(r.note)+'</div>':'')
          +'</div>';
        } else {
          // CRM
          var latestWeek=r.week_w2||r.week_w1||r.sheet||'';
          var prevWeek=r.week_w2?r.week_w1:'';
          var latestStatus=r.week_w2?r.status_w2:r.status_w1;
          var prevStatus=r.week_w2?r.status_w1:'';
          var sc=classifyStatus(latestStatus);
          return '<div class="record-row">'
            +'<div style="display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap;">'
              +'<div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;">'
                +'<span class="badge-crm"><i class="fa-solid fa-table" style="margin-right:3px;"></i>CRM</span>'
                +(r.sales?'<span style="font-size:12px;color:var(--text-m);"><i class="fa-solid fa-user-tie" style="font-size:10px;margin-right:2px;"></i>'+escH(r.sales)+'</span>':'')
                +(latestWeek?'<span style="font-size:11px;color:var(--text-s);">'+escH(latestWeek)+'</span>':'')
                +(r.delivery?'<span class="badge badge-amber" style="font-size:10px;"><i class="fa-regular fa-calendar" style="font-size:9px;"></i> 需求：'+escH(r.delivery)+'</span>':'')
                +(r.qty?'<span class="badge badge-gray" style="font-size:10px;">'+escH(String(r.qty))+' 台</span>':'')
              +'</div>'
              +'<div style="display:flex;align-items:center;gap:6px;">'
                +'<span class="badge '+statusBadgeCls[sc]+'" style="font-size:10px;">'+statusLabel[sc]+'</span>'
                +(canDelete(r)?'<button class="del-btn" onclick="deleteCRMRecord(\''+r.id+'\')" title="刪除"><i class="fa-solid fa-trash-can"></i></button>':'')
              +'</div>'
            +'</div>'
            // 最新兩週進度
            +(latestStatus?'<div style="margin-top:8px;padding-top:6px;border-top:1px solid var(--border);">'
              +(latestWeek?'<div style="font-size:11px;color:var(--text-s);margin-bottom:3px;">'+escH(latestWeek)+' 最新進度</div>':'')
              +'<div style="font-size:13px;color:var(--text-b);font-weight:500;">'+hl(latestStatus,q)+'</div>'
              +(prevStatus&&prevWeek?'<div style="font-size:11px;color:var(--text-s);margin-top:6px;">'+escH(prevWeek)+'：'+hl(prevStatus,q)+'</div>':'')
            +'</div>':'')
          +'</div>';
        }
      }).join('');

      return '<div class="model-block">'
        +'<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;">'
          +'<i class="fa-solid fa-microchip" style="color:var(--accent);font-size:12px;"></i>'
          +'<span style="font-size:14px;font-weight:700;color:var(--text-h);">'+hl(mk,q)+'</span>'
          +'<span style="font-size:12px;color:var(--text-s);">'+records.length+' 筆紀錄</span>'
        +'</div>'
        +recordsHtml
      +'</div>';
    }).join('');

    return '<div class="company-card">'
      +'<div class="company-header">'
        +'<i class="fa-regular fa-building" style="color:var(--accent);font-size:14px;"></i>'
        +'<span style="font-size:16px;font-weight:700;color:var(--text-h);">'+hl(companyName,q)+'</span>'
        +'<span style="font-size:12px;color:var(--text-s);">'+modelKeys.length+' 個機型</span>'
      +'</div>'
      +modelsHtml
    +'</div>';
  }).join('');
}

function canDelete(r){
  if(!currentUserProfile) return false;
  var role=currentUserProfile.role;
  if(role==='admin') return true;
  if(role==='assistant') return false;
  if(role==='sales') return r.created_by===currentUser.id;
  return false;
}

async function deleteCustRecord(id){

function renderStats(){
  var model=(document.getElementById('f-stat-model')||{}).value||'';
  var month=(document.getElementById('f-stat-month')||{}).value||'';
  var el=document.getElementById('stats-records');
  if(!el) return;

  if(!model&&!month){
    el.innerHTML='<div class="empty-state"><i class="fa-solid fa-chart-bar" style="font-size:36px;display:block;margin-bottom:12px;"></i>請輸入機型或月份進行統計</div>';
    return;
  }

  // 合併所有資料篩選
  var allRecords=[];
  custData.forEach(function(r){
    if(model&&!matchQ(r.model||'',model)) return;
    if(month&&!matchQ(r.delivery||'',month)) return;
    allRecords.push({_type:'wechat',company:r.company,model:r.model,qty:parseInt(r.qty)||0,delivery:r.delivery,statusText:r.status,contact:r.contact,date:r.date,raw:r.raw,id:r.id});
  });
  crmData.forEach(function(r){
    if(model&&!matchQ(r.model||'',model)) return;
    if(month&&!matchQ(r.delivery||'',month)) return;
    var latestStatus=r.status_w2||r.status_w1||'';
    allRecords.push({_type:'crm',company:r.customer,model:r.model,qty:parseInt(r.qty)||0,delivery:r.delivery,statusText:latestStatus,sales:r.sales,week:r.week_w2||r.week_w1||'',id:r.id});
  });

  if(!allRecords.length){
    el.innerHTML='<div class="empty-state"><i class="fa-solid fa-inbox" style="font-size:36px;display:block;margin-bottom:12px;"></i>查無符合資料</div>';
    return;
  }

  // 分類統計
  var confirmed=[],ongoing=[],lost=[],unknown=[];
  var totalConfirmed=0,totalOngoing=0,totalLost=0;
  allRecords.forEach(function(r){
    var sc=classifyStatus(r.statusText);
    if(sc==='confirmed'){confirmed.push(r);totalConfirmed+=r.qty;}
    else if(sc==='ongoing'){ongoing.push(r);totalOngoing+=r.qty;}
    else if(sc==='lost'){lost.push(r);totalLost+=r.qty;}
    else unknown.push(r);
  });

  function recordCard(r){
    return '<div style="background:var(--card);border:1px solid var(--border);border-radius:8px;padding:10px 12px;margin-bottom:6px;font-size:12px;">'
      +'<div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:4px;">'
        +(r._type==='wechat'?'<span class="badge-wechat"><i class="fa-brands fa-weixin" style="margin-right:3px;"></i>微信</span>':'<span class="badge-crm"><i class="fa-solid fa-table" style="margin-right:3px;"></i>CRM</span>')
        +'<b style="color:var(--text-h);">'+escH(r.company||'')+'</b>'
        +(r.contact?'<span style="color:var(--text-m);">/ '+escH(r.contact)+'</span>':'')
        +(r.sales?'<span style="color:var(--text-m);">業務：'+escH(r.sales)+'</span>':'')
        +(r.week?'<span style="color:var(--text-s);">'+escH(r.week)+'</span>':'')
        +(r.date?'<span style="color:var(--text-s);">'+escH(r.date)+'</span>':'')
      +'</div>'
      +'<div style="display:flex;gap:8px;flex-wrap:wrap;color:var(--text-m);">'
        +'<span><i class="fa-solid fa-microchip" style="font-size:10px;margin-right:3px;"></i>'+escH(r.model||'—')+'</span>'
        +(r.qty?'<span><i class="fa-solid fa-desktop" style="font-size:10px;margin-right:3px;"></i>'+r.qty+' 台</span>':'')
        +(r.delivery?'<span><i class="fa-regular fa-calendar" style="font-size:10px;margin-right:3px;"></i>'+escH(r.delivery)+'</span>':'')
      +'</div>'
      +(r.statusText?'<div style="margin-top:5px;color:var(--text-s);">進度：'+escH(r.statusText)+'</div>':'')
    +'</div>';
  }

  function section(title,color,records,total,icon){
    if(!records.length) return '';
    return '<div class="stat-summary-card" style="border-left:4px solid '+color+';">'
      +'<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">'
        +'<div style="font-size:14px;font-weight:700;color:var(--text-h);">'+icon+' '+title+'</div>'
        +'<div style="font-size:18px;font-weight:700;color:'+color+';">'+total+' 台 <span style="font-size:12px;color:var(--text-s);">('+records.length+' 筆)</span></div>'
      +'</div>'
      +records.map(recordCard).join('')
    +'</div>';
  }

  el.innerHTML=
    '<div style="background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:14px;">'
      +'<div style="font-size:13px;color:var(--text-m);margin-bottom:8px;">統計範圍：'+(model?'機型 <b>'+escH(model)+'</b> ':'')+(month?'月份 <b>'+escH(month)+'</b>':'')+'</div>'
      +'<div style="display:flex;gap:12px;flex-wrap:wrap;">'
        +'<div style="text-align:center;"><div style="font-size:22px;font-weight:700;color:var(--green);">'+totalConfirmed+'</div><div style="font-size:11px;color:var(--text-s);">已確認 (台)</div></div>'
        +'<div style="text-align:center;"><div style="font-size:22px;font-weight:700;color:var(--amber);">'+totalOngoing+'</div><div style="font-size:11px;color:var(--text-s);">進行中 (台)</div></div>'
        +'<div style="text-align:center;"><div style="font-size:22px;font-weight:700;color:var(--red);">'+totalLost+'</div><div style="font-size:11px;color:var(--text-s);">流失 (台)</div></div>'
        +(unknown.length?'<div style="text-align:center;"><div style="font-size:22px;font-weight:700;color:var(--text-s);">'+unknown.length+'</div><div style="font-size:11px;color:var(--text-s);">狀態不明 (筆)</div></div>':'')
      +'</div>'
    +'</div>'
    +section('已確認','#1a7a4a',confirmed,totalConfirmed,'✅')
    +section('進行中','#8a5a00',ongoing,totalOngoing,'🔄')
    +section('流失/結案','#b03030',lost,totalLost,'❌')
    +(unknown.length?'<div class="stat-summary-card" style="border-left:4px solid #a09990;">'
      +'<div style="font-size:14px;font-weight:700;color:var(--text-h);margin-bottom:10px;">⚠️ 狀態不明（'+unknown.length+' 筆）</div>'
      +unknown.map(recordCard).join('')
    +'</div>':'');
}

        +(parsed.model?'<span class="badge badge-gray">'+escH(parsed.model)+'</span>':'')
        +(parsed.qty?'<span class="badge badge-gray">'+parsed.qty+' 台</span>':'')
        +(parsed.delivery?'<span class="badge badge-amber">交期 '+escH(parsed.delivery)+'</span>':'')
        +'</div></div>';
      document.getElementById('paste-input').value='';
      if(currentTab==='customer') renderUnified();
    } else {
      var {data:insertedE,error:errE}=await sb.from('engineer_messages').insert({
        topic:parsed.topic,company:parsed.company,model:parsed.model,
        engineer:parsed.engineer,date:parsed.date,instruction:parsed.instruction,

        +'<div style="font-size:13px;font-weight:600;color:var(--green);"><i class="fa-solid fa-circle-check" style="margin-right:5px;"></i>解析成功，已儲存至資料庫</div>'
        +'</div>';
      document.getElementById('paste-input').value='';
      if(currentTab==='engineer') renderEngineer();
    }
  }catch(err){
    resultEl.innerHTML='<div style="background:var(--red-bg);border:1px solid #f0b8b8;border-radius:10px;padding:12px;font-size:13px;color:var(--red);"><i class="fa-solid fa-circle-exclamation" style="margin-right:6px;"></i>解析失敗：'+escH(err.message)+'</div>';

  }

function handleExcelFile(e){
  var file=e.target.files[0];
  if(!file) return;
  var resultEl=document.getElementById('excel-result');
  resultEl.style.display='block';
  resultEl.innerHTML='<div style="background:var(--accent-bg);border:1px solid #b8d4f4;border-radius:10px;padding:12px;font-size:13px;color:var(--accent);display:flex;align-items:center;gap:8px;"><span class="spinner"></span> 正在解析 Excel...</div>';

  var reader=new FileReader();
  reader.onload=async function(e){
    try{
      var data=new Uint8Array(e.target.result);
      var workbook=XLSX.read(data,{type:'array'});
      var skipSheets=['已接訂單','已無需求_結案','Sheet1','Sheet2'];
      var parsed=[];
      var sheetCount=0,rowCount=0;

      workbook.SheetNames.forEach(function(sheetName){
        if(skipSheets.indexOf(sheetName)>-1) return;
        var ws=workbook.Sheets[sheetName];
        sheetCount++;

        // ── 合併儲存格處理：把合併範圍的值填回每一格 ──
        var merges=ws['!merges']||[];
        merges.forEach(function(merge){
          var startCell=XLSX.utils.encode_cell({r:merge.s.r,c:merge.s.c});
          var masterVal=ws[startCell]?ws[startCell].v:'';
          for(var mr=merge.s.r;mr<=merge.e.r;mr++){
            for(var mc=merge.s.c;mc<=merge.e.c;mc++){
              var cellAddr=XLSX.utils.encode_cell({r:mr,c:mc});
              if(!ws[cellAddr]&&masterVal!==''){
                ws[cellAddr]={v:masterVal,t:typeof masterVal==='number'?'n':'s'};
              }
            }
          }
        });

        var rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});

        // 找週次欄位（格式 YYYY-MM-W#）
        var headerRow=rows[1]||[];
        var weekCols=[];
        headerRow.forEach(function(h,idx){
          if(idx<5) return;
          var hs=String(h||'').trim();
          if(hs&&(hs.indexOf('W')>-1||hs.indexOf('w')>-1)&&/\d{4}/.test(hs)){
            weekCols.push({idx:idx,label:hs});
          }
        });
        var w1=weekCols.length>=2?weekCols[weekCols.length-2]:null;
        var w2=weekCols.length>=1?weekCols[weekCols.length-1]:null;

        rows.forEach(function(row,idx){
          if(idx<2) return;
          var sales=String(row[0]||'').trim();
          var customer=String(row[1]||'').trim();
          var model=String(row[2]||'').trim();
          var qty=String(row[3]||'').trim();
          var delivery=String(row[4]||'').trim();

          // 機型空白就跳過（合併儲存格已補值，所以業務/客戶不會空）
          if(!model) return;

          // 處理交期（Excel日期數字）
          var deliveryStr=delivery;
          if(!isNaN(delivery)&&delivery!==''){
            try{var d=XLSX.SSF.parse_date_code(Number(delivery));if(d)deliveryStr=d.y+'/'+(d.m<10?'0':'')+d.m+'/'+(d.d<10?'0':'')+d.d;}catch(ex){}
          }

          // 每行獨立讀取進度，不繼承上一行
          var status1=w1?String(row[w1.idx]||'').trim():'';
          var status2=w2?String(row[w2.idx]||'').trim():'';

          // 若最新兩週都空，往前找最後有值的週欄
          if(!status1&&!status2){
            for(var wi=weekCols.length-1;wi>=0;wi--){
              var sv=String(row[weekCols[wi].idx]||'').trim();
              if(sv){
                status2=sv;
                if(!w2) w2={label:weekCols[wi].label,idx:weekCols[wi].idx};
                break;
              }
            }
          }

          rowCount++;
          parsed.push({
            sales:sales||sheetName,
            customer:customer,
            model:model,
            qty:qty,
            delivery:deliveryStr,
            status_w1:status1,
            week_w1:w1?w1.label:'',
            status_w2:status2,
            week_w2:w2?w2.label:'',
            sheet:sheetName,
            created_by:currentUser.id
          });
        });
      });

      // 批次存到 Supabase（分批避免太大）
      var batchSize=50;
      for(var i=0;i<parsed.length;i+=batchSize){
        var batch=parsed.slice(i,i+batchSize);
        var {error}=await sb.from('crm_records').insert(batch);
        if(error) throw new Error(error.message);
      }

      // 重新載入CRM資料
      var {data:newCRM}=await sb.from('crm_records').select('*').order('created_at',{ascending:false});
      crmData=newCRM||[];

      resultEl.innerHTML='<div style="background:var(--green-bg);border:1px solid #a0d8b8;border-radius:10px;padding:12px 14px;">'
        +'<div style="font-size:13px;font-weight:600;color:var(--green);margin-bottom:8px;"><i class="fa-solid fa-circle-check" style="margin-right:5px;"></i>匯入成功！已儲存至資料庫</div>'
        +'<div style="font-size:13px;color:var(--text-m);">共讀取 <b>'+sheetCount+'</b> 位業務，<b>'+rowCount+'</b> 筆訂單資料</div>'
        +'<button class="btn-primary" style="margin-top:10px;width:100%;justify-content:center;" onclick="closeExcelImport();switchTab(\'customer\')">'
        +'<i class="fa-solid fa-magnifying-glass"></i> 前往客戶商務查看'
        +'</button></div>';

      if(currentTab==='customer') renderUnified();
    }catch(err){
      resultEl.innerHTML='<div style="background:var(--red-bg);border:1px solid #f0b8b8;border-radius:10px;padding:12px;font-size:13px;color:var(--red);"><i class="fa-solid fa-circle-exclamation" style="margin-right:5px;"></i>解析失敗：'+escH(err.message)+'</div>';
    }
  };
  reader.readAsArrayBuffer(file);
}

function closeDetail(){document.getElementById('detail-modal').style.display='none';}
</script>
</body>
</html>
