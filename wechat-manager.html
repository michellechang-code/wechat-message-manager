<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>訊息管理系統</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet" />
<script>
tailwind.config = {
  theme: {
    extend: {
      fontFamily: { tc: ['Noto Sans TC', 'sans-serif'] },
      colors: {
        bg:      '#2c3347',
        surface: '#323a52',
        card:    '#3a4260',
        border:  '#454e6e',
        accent:  '#5b8dee',
        accentL: '#7aa5f5',
        muted:   '#7b88a8',
        soft:    '#a8b4cc',
        text:    '#dde3f0',
      }
    }
  }
}
</script>
<style>
  * { font-family: 'Noto Sans TC', sans-serif; box-sizing: border-box; }
  body { background: #2c3347; color: #dde3f0; min-height: 100vh; }

  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: #0f1117; }
  ::-webkit-scrollbar-thumb { background: #2a2f45; border-radius: 2px; }

  .tab-active {
    color: #3b82f6 !important;
    border-bottom: 2px solid #3b82f6;
  }
  .card-hover {
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .card-hover:hover {
    border-color: #3b82f6 !important;
    box-shadow: 0 0 0 1px #3b82f633;
  }
  .badge {
    display: inline-flex; align-items: center; gap: 4px;
    font-size: 11px; font-weight: 500;
    padding: 2px 8px; border-radius: 9999px;
  }
  .badge-blue   { background: #1e3a5f; color: #60a5fa; }
  .badge-green  { background: #14312a; color: #34d399; }
  .badge-amber  { background: #2d2008; color: #fbbf24; }
  .badge-gray   { background: #1e2336; color: #94a3b8; border: 1px solid #2a2f45; }
  .badge-teal   { background: #0d2d2a; color: #2dd4bf; }
  .badge-red    { background: #2d1010; color: #f87171; }

  .status-dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; }
  .dot-green  { background: #34d399; }
  .dot-amber  { background: #fbbf24; }
  .dot-gray   { background: #64748b; }

  .input-field {
    background: #1e2336;
    border: 1px solid #2a2f45;
    color: #e2e8f0;
    border-radius: 8px;
    padding: 8px 12px;
    font-size: 14px;
    width: 100%;
    outline: none;
    transition: border-color 0.2s;
  }
  .input-field:focus { border-color: #3b82f6; }
  .input-field::placeholder { color: #475569; }

  select.input-field option { background: #1e2336; }

  .btn-primary {
    background: #3b82f6;
    color: white;
    border: none;
    border-radius: 8px;
    padding: 9px 18px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
    display: inline-flex; align-items: center; gap: 6px;
  }
  .btn-primary:hover  { background: #2563eb; }
  .btn-primary:active { transform: scale(0.97); }

  .btn-ghost {
    background: transparent;
    color: #94a3b8;
    border: 1px solid #2a2f45;
    border-radius: 8px;
    padding: 7px 14px;
    font-size: 13px;
    cursor: pointer;
    transition: background 0.2s, color 0.2s;
  }
  .btn-ghost:hover { background: #1e2336; color: #e2e8f0; }

  .type-btn {
    padding: 5px 14px;
    font-size: 12px;
    border-radius: 20px;
    border: 1px solid #2a2f45;
    background: transparent;
    color: #64748b;
    cursor: pointer;
    transition: all 0.2s;
  }
  .type-btn.active {
    background: #1e3a5f;
    color: #60a5fa;
    border-color: #3b82f6;
  }

  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 200;
    display: flex; align-items: center; justify-content: center;
    padding: 16px;
  }
  .modal-box {
    background: #181c27;
    border: 1px solid #2a2f45;
    border-radius: 16px;
    padding: 24px;
    width: 100%; max-width: 560px;
    max-height: 85vh; overflow-y: auto;
  }

  mark { background: #854d0e; color: #fde68a; border-radius: 2px; padding: 0 2px; }

  .spinner {
    width: 18px; height: 18px;
    border: 2px solid #1e3a5f;
    border-top-color: #3b82f6;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    display: inline-block;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .slide-in {
    animation: slideIn 0.25s ease;
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .empty-state {
    text-align: center; padding: 48px 0;
    color: #475569;
  }
  .section-divider {
    border: none; border-top: 1px solid #2a2f45; margin: 12px 0;
  }
</style>
</head>
<body class="min-h-screen">

<!-- TOP NAV -->
<header class="sticky top-0 z-50" style="background:#0f1117; border-bottom: 1px solid #2a2f45;">
  <div class="max-w-3xl mx-auto px-4 py-3 flex items-center justify-between">
    <div class="flex items-center gap-2">
      <div style="background:#1e3a5f; border-radius:8px; padding:6px 10px;">
        <i class="fa-brands fa-weixin" style="color:#3b82f6; font-size:16px;"></i>
      </div>
      <div>
        <div style="font-size:15px; font-weight:700; color:#e2e8f0; letter-spacing:0.5px;">訊息管理系統</div>
        <div style="font-size:11px; color:#475569;">微信訊息 · 智能整理</div>
      </div>
    </div>
    <button class="btn-ghost" style="font-size:12px; padding:6px 12px;" onclick="openImport()">
      <i class="fa-solid fa-plus" style="font-size:11px;"></i> 匯入訊息
    </button>
  </div>
</header>

<!-- TABS -->
<div class="sticky z-40" style="top:57px; background:#0f1117; border-bottom:1px solid #2a2f45;">
  <div class="max-w-3xl mx-auto px-4">
    <div class="flex gap-0">
      <button id="tab-cust-btn" class="tab-active py-3 px-5 text-sm font-medium border-b-2 transition-colors"
        style="color:#3b82f6; border-color:#3b82f6; background:transparent; cursor:pointer;"
        onclick="switchTab('customer')">
        <i class="fa-solid fa-users mr-1"></i> 客戶往來
      </button>
      <button id="tab-eng-btn" class="py-3 px-5 text-sm font-medium border-b-2 border-transparent transition-colors"
        style="color:#64748b; background:transparent; cursor:pointer;"
        onclick="switchTab('engineer')">
        <i class="fa-solid fa-screwdriver-wrench mr-1"></i> 工程師任務
      </button>
    </div>
  </div>
</div>

<!-- MAIN -->
<main class="max-w-3xl mx-auto px-4 py-4">

  <!-- CUSTOMER TAB -->
  <div id="tab-customer">
    <!-- Search -->
    <div class="flex gap-2 mb-4">
      <div class="relative flex-1">
        <i class="fa-solid fa-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2" style="color:#475569; font-size:13px;"></i>
        <input id="cust-search" class="input-field" style="padding-left:34px;"
          placeholder="搜尋公司、聯絡人、機型、關鍵字..."
          oninput="filterCustomer()" />
      </div>
      <select id="cust-company-filter" class="input-field" style="width:auto; min-width:100px;" onchange="filterCustomer()">
        <option value="">全部客戶</option>
      </select>
    </div>
    <!-- Stats row -->
    <div class="flex gap-3 mb-4 overflow-x-auto pb-1">
      <div style="background:#1e2336; border:1px solid #2a2f45; border-radius:10px; padding:10px 16px; min-width:90px; flex-shrink:0;">
        <div style="font-size:11px; color:#64748b; margin-bottom:2px;">總筆數</div>
        <div id="stat-cust-total" style="font-size:22px; font-weight:700; color:#e2e8f0;">0</div>
      </div>
      <div style="background:#1e2336; border:1px solid #2a2f45; border-radius:10px; padding:10px 16px; min-width:90px; flex-shrink:0;">
        <div style="font-size:11px; color:#64748b; margin-bottom:2px;">詢價中</div>
        <div id="stat-cust-inquiry" style="font-size:22px; font-weight:700; color:#fbbf24;">0</div>
      </div>
      <div style="background:#1e2336; border:1px solid #2a2f45; border-radius:10px; padding:10px 16px; min-width:90px; flex-shrink:0;">
        <div style="font-size:11px; color:#64748b; margin-bottom:2px;">確認中</div>
        <div id="stat-cust-confirm" style="font-size:22px; font-weight:700; color:#60a5fa;">0</div>
      </div>
      <div style="background:#1e2336; border:1px solid #2a2f45; border-radius:10px; padding:10px 16px; min-width:90px; flex-shrink:0;">
        <div style="font-size:11px; color:#64748b; margin-bottom:2px;">已簽訂</div>
        <div id="stat-cust-signed" style="font-size:22px; font-weight:700; color:#34d399;">0</div>
      </div>
    </div>
    <!-- Records -->
    <div id="cust-records"></div>
  </div>

  <!-- ENGINEER TAB -->
  <div id="tab-engineer" style="display:none;">
    <div class="flex gap-2 mb-4">
      <div class="relative flex-1">
        <i class="fa-solid fa-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2" style="color:#475569; font-size:13px;"></i>
        <input id="eng-search" class="input-field" style="padding-left:34px;"
          placeholder="搜尋主題、工程師、指示、關鍵字..."
          oninput="filterEngineer()" />
      </div>
      <select id="eng-status-filter" class="input-field" style="width:auto; min-width:90px;" onchange="filterEngineer()">
        <option value="">全部狀態</option>
        <option value="待處理">待處理</option>
        <option value="進行中">進行中</option>
        <option value="完成">完成</option>
      </select>
    </div>
    <!-- Stats -->
    <div class="flex gap-3 mb-4 overflow-x-auto pb-1">
      <div style="background:#1e2336; border:1px solid #2a2f45; border-radius:10px; padding:10px 16px; min-width:90px; flex-shrink:0;">
        <div style="font-size:11px; color:#64748b; margin-bottom:2px;">總任務</div>
        <div id="stat-eng-total" style="font-size:22px; font-weight:700; color:#e2e8f0;">0</div>
      </div>
      <div style="background:#1e2336; border:1px solid #2a2f45; border-radius:10px; padding:10px 16px; min-width:90px; flex-shrink:0;">
        <div style="font-size:11px; color:#64748b; margin-bottom:2px;">待處理</div>
        <div id="stat-eng-pending" style="font-size:22px; font-weight:700; color:#94a3b8;">0</div>
      </div>
      <div style="background:#1e2336; border:1px solid #2a2f45; border-radius:10px; padding:10px 16px; min-width:90px; flex-shrink:0;">
        <div style="font-size:11px; color:#64748b; margin-bottom:2px;">進行中</div>
        <div id="stat-eng-ongoing" style="font-size:22px; font-weight:700; color:#fbbf24;">0</div>
      </div>
      <div style="background:#1e2336; border:1px solid #2a2f45; border-radius:10px; padding:10px 16px; min-width:90px; flex-shrink:0;">
        <div style="font-size:11px; color:#64748b; margin-bottom:2px;">完成</div>
        <div id="stat-eng-done" style="font-size:22px; font-weight:700; color:#34d399;">0</div>
      </div>
    </div>
    <div id="eng-records"></div>
  </div>

</main>

<!-- IMPORT MODAL -->
<div id="import-modal" class="modal-overlay" style="display:none;" onclick="handleOverlayClick(event)">
  <div class="modal-box slide-in">
    <div class="flex items-center justify-between mb-5">
      <div style="font-size:16px; font-weight:700; color:#e2e8f0;">
        <i class="fa-solid fa-file-import mr-2" style="color:#3b82f6;"></i>匯入微信訊息
      </div>
      <button onclick="closeImport()" class="btn-ghost" style="padding:4px 10px; font-size:13px;">
        <i class="fa-solid fa-xmark"></i>
      </button>
    </div>

    <!-- Type selector -->
    <div style="font-size:12px; color:#64748b; margin-bottom:8px;">訊息類型</div>
    <div class="flex gap-2 mb-4">
      <button class="type-btn active" id="type-customer-btn" onclick="setMsgType('customer')">
        <i class="fa-solid fa-users mr-1"></i>客戶訊息
      </button>
      <button class="type-btn" id="type-engineer-btn" onclick="setMsgType('engineer')">
        <i class="fa-solid fa-screwdriver-wrench mr-1"></i>工程師任務
      </button>
    </div>

    <!-- Manual fields toggle -->
    <div class="flex items-center gap-2 mb-3">
      <div style="flex:1; height:1px; background:#2a2f45;"></div>
      <span style="font-size:11px; color:#475569;">方式一：AI 自動解析</span>
      <div style="flex:1; height:1px; background:#2a2f45;"></div>
    </div>

    <textarea id="paste-input" class="input-field mb-3"
      style="height:130px; resize:none; font-size:13px; line-height:1.7;"
      placeholder="直接貼入微信聊天記錄（可含時間戳）&#10;&#10;例：&#10;王大明 2024/6/10 14:32&#10;TM四向光A3 500pcs 報價NT$85 交期6/30&#10;&#10;AI 會自動拆解欄位"></textarea>

    <div class="flex justify-end gap-2 mb-4">
      <button class="btn-ghost" onclick="document.getElementById('paste-input').value=''">清空</button>
      <button class="btn-primary" onclick="parseMessage()" id="parse-btn">
        <i class="fa-solid fa-wand-magic-sparkles"></i> AI 解析並儲存
      </button>
    </div>

    <div id="parse-result" style="display:none;"></div>

    <div class="flex items-center gap-2 my-4">
      <div style="flex:1; height:1px; background:#2a2f45;"></div>
      <span style="font-size:11px; color:#475569;">方式二：手動輸入</span>
      <div style="flex:1; height:1px; background:#2a2f45;"></div>
    </div>

    <!-- Customer manual form -->
    <div id="manual-customer-form">
      <div class="grid grid-cols-2 gap-3 mb-3">
        <div>
          <div style="font-size:12px; color:#64748b; margin-bottom:5px;">客戶公司 <span style="color:#f87171;">*</span></div>
          <input id="m-company" class="input-field" placeholder="例：華通" />
        </div>
        <div>
          <div style="font-size:12px; color:#64748b; margin-bottom:5px;">聯絡人 <span style="color:#f87171;">*</span></div>
          <input id="m-contact" class="input-field" placeholder="例：王大明" />
        </div>
        <div>
          <div style="font-size:12px; color:#64748b; margin-bottom:5px;">機型</div>
          <input id="m-model" class="input-field" placeholder="例：TM四向光 A3" />
        </div>
        <div>
          <div style="font-size:12px; color:#64748b; margin-bottom:5px;">數量</div>
          <input id="m-qty" class="input-field" placeholder="例：500" type="number" />
        </div>
        <div>
          <div style="font-size:12px; color:#64748b; margin-bottom:5px;">價格</div>
          <input id="m-price" class="input-field" placeholder="例：NT$85/pcs" />
        </div>
        <div>
          <div style="font-size:12px; color:#64748b; margin-bottom:5px;">交期</div>
          <input id="m-delivery" class="input-field" placeholder="例：6/30" />
        </div>
        <div>
          <div style="font-size:12px; color:#64748b; margin-bottom:5px;">日期</div>
          <input id="m-date" class="input-field" type="date" />
        </div>
        <div>
          <div style="font-size:12px; color:#64748b; margin-bottom:5px;">狀態</div>
          <select id="m-status" class="input-field">
            <option value="詢價中">詢價中</option>
            <option value="確認中">確認中</option>
            <option value="已簽訂">已簽訂</option>
          </select>
        </div>
      </div>
      <div>
        <div style="font-size:12px; color:#64748b; margin-bottom:5px;">備註</div>
        <textarea id="m-note" class="input-field mb-3" style="height:60px; resize:none;" placeholder="其他備註..."></textarea>
      </div>
      <div class="flex justify-end">
        <button class="btn-primary" onclick="manualSaveCustomer()">
          <i class="fa-solid fa-floppy-disk"></i> 儲存
        </button>
      </div>
    </div>

    <!-- Engineer manual form -->
    <div id="manual-engineer-form" style="display:none;">
      <div class="grid grid-cols-2 gap-3 mb-3">
        <div class="col-span-2">
          <div style="font-size:12px; color:#64748b; margin-bottom:5px;">主題 <span style="color:#f87171;">*</span></div>
          <input id="e-topic" class="input-field" placeholder="例：TM四向光 — 光衰測試" />
        </div>
        <div>
          <div style="font-size:12px; color:#64748b; margin-bottom:5px;">工程師 <span style="color:#f87171;">*</span></div>
          <input id="e-engineer" class="input-field" placeholder="例：陳工" />
        </div>
        <div>
          <div style="font-size:12px; color:#64748b; margin-bottom:5px;">日期</div>
          <input id="e-date" class="input-field" type="date" />
        </div>
        <div class="col-span-2">
          <div style="font-size:12px; color:#64748b; margin-bottom:5px;">指示內容</div>
          <textarea id="e-instruction" class="input-field" style="height:60px; resize:none;" placeholder="給工程師的指示..."></textarea>
        </div>
        <div class="col-span-2">
          <div style="font-size:12px; color:#64748b; margin-bottom:5px;">回報進度</div>
          <textarea id="e-progress" class="input-field" style="height:60px; resize:none;" placeholder="工程師回報內容..."></textarea>
        </div>
        <div>
          <div style="font-size:12px; color:#64748b; margin-bottom:5px;">狀態</div>
          <select id="e-status" class="input-field">
            <option value="待處理">待處理</option>
            <option value="進行中">進行中</option>
            <option value="完成">完成</option>
          </select>
        </div>
      </div>
      <div class="flex justify-end">
        <button class="btn-primary" onclick="manualSaveEngineer()">
          <i class="fa-solid fa-floppy-disk"></i> 儲存
        </button>
      </div>
    </div>
  </div>
</div>

<!-- DETAIL MODAL -->
<div id="detail-modal" class="modal-overlay" style="display:none;" onclick="handleDetailOverlay(event)">
  <div class="modal-box slide-in" id="detail-content-box"></div>
</div>

<script>
// ─── DATA ────────────────────────────────────────────────────────────────────
var custData = [
  { id:1, company:'華通', contact:'王大明', date:'2024-06-10', model:'TM四向光 A3', qty:500, price:'NT$85/pcs', delivery:'6/30', status:'確認中', note:'', raw:'王大明 10:32\nTM四向光A3 500pcs NT$85 交期6/30', tags:['四向光','報價'] },
  { id:2, company:'光電科技', contact:'林美華', date:'2024-06-08', model:'LED模組 B型', qty:1200, price:'NT$42/pcs', delivery:'7/15', status:'已簽訂', note:'客戶要求加速', raw:'林美華 09:15\nLED模組B型 1200pcs 42元 7/15到貨', tags:['LED','量產'] },
  { id:3, company:'鉅亞電子', contact:'張勝利', date:'2024-06-05', model:'TM雙向燈板', qty:200, price:'NT$120/pcs', delivery:'未定', status:'詢價中', note:'', raw:'張勝利 16:48\n雙向燈板200片 先報價 交期待確定', tags:['詢價'] },
];
var engData = [
  { id:1, topic:'TM四向光 — 光衰測試', engineer:'陳工', date:'2024-06-10', instruction:'請重新測量光衰曲線，高溫85°C條件下', progress:'已完成初測，數據明天出', status:'進行中', tags:['光衰','測試'] },
  { id:2, topic:'模組組裝 — 良率改善', engineer:'林工 / 黃工', date:'2024-06-09', instruction:'第三道焊接工序溫度調降5°，觀察一周良率', progress:'良率從92%提升至95.8%', status:'完成', tags:['良率','焊接'] },
  { id:3, topic:'B型外殼 — 尺寸公差確認', engineer:'吳工', date:'2024-06-07', instruction:'與供應商確認外殼公差±0.2mm可接受', progress:'尚未回報', status:'待處理', tags:['公差','外殼'] },
];
var currentTab = 'customer';
var currentMsgType = 'customer';

// ─── TAB ─────────────────────────────────────────────────────────────────────
function switchTab(tab) {
  currentTab = tab;
  document.getElementById('tab-customer').style.display  = tab==='customer'  ? '' : 'none';
  document.getElementById('tab-engineer').style.display  = tab==='engineer'  ? '' : 'none';
  var custBtn = document.getElementById('tab-cust-btn');
  var engBtn  = document.getElementById('tab-eng-btn');
  if (tab==='customer') {
    custBtn.classList.add('tab-active'); custBtn.style.color='#3b82f6'; custBtn.style.borderColor='#3b82f6';
    engBtn.classList.remove('tab-active'); engBtn.style.color='#64748b'; engBtn.style.borderColor='transparent';
    renderCustomer(custData);
  } else {
    engBtn.classList.add('tab-active'); engBtn.style.color='#3b82f6'; engBtn.style.borderColor='#3b82f6';
    custBtn.classList.remove('tab-active'); custBtn.style.color='#64748b'; custBtn.style.borderColor='transparent';
    renderEngineer(engData);
  }
}

// ─── HIGHLIGHT ───────────────────────────────────────────────────────────────
function hl(text, q) {
  if (!q || !text) return text || '';
  var escaped = q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
  return String(text).replace(new RegExp('('+escaped+')','gi'),'<mark>$1</mark>');
}

// ─── CUSTOMER RENDER ─────────────────────────────────────────────────────────
function renderCustomer(data) {
  var q  = (document.getElementById('cust-search')||{}).value||'';
  var cf = (document.getElementById('cust-company-filter')||{}).value||'';
  var filtered = data.filter(function(r) {
    if (cf && r.company !== cf) return false;
    if (!q) return true;
    var hay = [r.company, r.contact, r.model, r.price, r.delivery, r.status, r.note, r.raw].concat(r.tags||[]).join(' ').toLowerCase();
    return hay.indexOf(q.toLowerCase()) > -1;
  });
  // Update company dropdown
  var companies = [...new Set(data.map(function(r){return r.company;}))];
  var sel = document.getElementById('cust-company-filter');
  if (sel) {
    var cur = sel.value;
    sel.innerHTML = '<option value="">全部客戶</option>' + companies.map(function(c){
      return '<option value="'+c+'"'+(c===cur?' selected':'')+'>'+c+'</option>';
    }).join('');

  // Stats
  document.getElementById('stat-cust-total').textContent = data.length;
  document.getElementById('stat-cust-inquiry').textContent = data.filter(function(r){return r.status==='詢價中';}).length;

  var statusClass = { '詢價中':'badge-amber','確認中':'badge-blue','已簽訂':'badge-green' };

  if (!filtered.length) {

            +hl(r.company, q)
            +'<span style="color:#475569; font-size:13px; font-weight:400;"> / </span>'
            +'<i class="fa-solid fa-user" style="color:#94a3b8; font-size:11px; margin-right:4px;"></i>'
            +'<span style="font-size:14px; font-weight:500; color:#cbd5e1;">'+hl(r.contact,q)+'</span>'
          +'</div>'
          +'<div style="font-size:13px; color:#94a3b8; margin-top:2px;">'
            +'<i class="fa-solid fa-microchip" style="font-size:11px; margin-right:4px;"></i>'+hl(r.model||'—',q)
          +'</div>'
        +'</div>'
        +'<div style="text-align:right;">'
          +'<div class="badge '+( statusClass[r.status]||'badge-gray' )+'">'+r.status+'</div>'
          +'<div style="font-size:11px; color:#475569; margin-top:4px;">'+r.date+'</div>'
        +'</div>'
      +'</div>'
      // Badges

        +(r.qty ? '<span class="badge badge-gray"><i class="fa-solid fa-box fa-xs"></i> '+hl(String(r.qty),q)+' pcs</span>' : '')
        +(r.price ? '<span class="badge badge-green"><i class="fa-solid fa-tag fa-xs"></i> '+hl(r.price,q)+'</span>' : '')
        +(r.delivery ? '<span class="badge badge-amber"><i class="fa-solid fa-calendar fa-xs"></i> 交期 '+hl(r.delivery,q)+'</span>' : '')

// ─── AI PARSE ────────────────────────────────────────────────────────────────
async function parseMessage() {
  var text = document.getElementById('paste-input').value.trim();
  if (!text) return;
  var btn = document.getElementById('parse-btn');
  var resultEl = document.getElementById('parse-result');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> 解析中...';
  resultEl.style.display = 'block';
  resultEl.innerHTML = '<div style="background:#1e2336;border:1px solid #2a2f45;border-radius:10px;padding:12px 14px;font-size:13px;color:#64748b;"><span class="spinner"></span> AI 正在解析訊息...</div>';

  var isCustomer = currentMsgType === 'customer';
  var systemPrompt = isCustomer
    ? '你是訊息解析助理。從微信對話中提取以下欄位並以純JSON回傳（不含```code block```）：company(客戶公司名稱), contact(聯絡人姓名/對話者), date(日期格式YYYY-MM-DD，若無用今天), model(機型產品), qty(數量純數字或null), price(價格含單位或null), delivery(交期或null), status(詢價中/確認中/已簽訂 三選一), note(備註), raw(原始訊息完整文字), tags(標籤陣列 2-4個)。回傳純JSON。'
    : '你是訊息解析助理。從微信對話中提取以下欄位並以純JSON回傳（不含```code block```）：topic(主題格式"產品 — 事項"), engineer(工程師名稱), date(日期格式YYYY-MM-DD，若無用今天), instruction(指示內容), progress(回報進度，若無則"尚未回報"), status(待處理/進行中/完成 三選一), tags(標籤陣列 2-4個)。回傳純JSON。';

  try {
    var resp = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST',
      headers:{ 'Content-Type':'application/json' },
      body: JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:1000,
        system: systemPrompt,
        messages:[{ role:'user', content: text }]
      })
    });
    var data = await resp.json();
    var raw = data.content.map(function(c){return c.text||'';}).join('');
    var clean = raw.replace(/```json|```/g,'').trim();
    var parsed = JSON.parse(clean);
    parsed.id = Date.now();
    if (!parsed.tags) parsed.tags = [];

    if (isCustomer) {
      if (!parsed.raw) parsed.raw = text;
      custData.unshift(parsed);
      resultEl.innerHTML =
        '<div style="background:#0d2516;border:1px solid #166534;border-radius:10px;padding:12px 14px;">'
        +'<div style="font-size:13px;font-weight:600;color:#34d399;margin-bottom:8px;"><i class="fa-solid fa-circle-check"></i> 解析成功，已加入客戶往來</div>'
        +'<div style="display:flex;flex-wrap:wrap;gap:5px;">'
          +(parsed.company?'<span class="badge badge-blue"><i class="fa-solid fa-building fa-xs"></i> '+parsed.company+'</span>':'')
          +(parsed.contact?'<span class="badge badge-gray"><i class="fa-solid fa-user fa-xs"></i> '+parsed.contact+'</span>':'')
          +(parsed.model?'<span class="badge badge-gray">'+parsed.model+'</span>':'')
          +(parsed.qty?'<span class="badge badge-gray">'+parsed.qty+' pcs</span>':'')
          +(parsed.price?'<span class="badge badge-green">'+parsed.price+'</span>':'')
          +(parsed.delivery?'<span class="badge badge-amber">交期 '+parsed.delivery+'</span>':'')
        +'</div>'
        +'</div>';
      document.getElementById('paste-input').value='';
      if (currentTab==='customer') renderCustomer(custData);
    } else {
      engData.unshift(parsed);
      resultEl.innerHTML =
        '<div style="background:#0d2516;border:1px solid #166534;border-radius:10px;padding:12px 14px;">'
        +'<div style="font-size:13px;font-weight:600;color:#34d399;margin-bottom:8px;"><i class="fa-solid fa-circle-check"></i> 解析成功，已加入工程師任務</div>'
        +'<div style="display:flex;flex-wrap:wrap;gap:5px;">'
          +(parsed.topic?'<span class="badge badge-blue">'+parsed.topic+'</span>':'')
          +(parsed.engineer?'<span class="badge badge-gray"><i class="fa-solid fa-user-gear fa-xs"></i> '+parsed.engineer+'</span>':'')
          +(parsed.status?'<span class="badge badge-amber">'+parsed.status+'</span>':'')
        +'</div>'
        +'</div>';
      document.getElementById('paste-input').value='';
      if (currentTab==='engineer') renderEngineer(engData);
    }
  } catch(err) {
    resultEl.innerHTML =
      '<div style="background:#2d1010;border:1px solid #7f1d1d;border-radius:10px;padding:12px 14px;font-size:13px;color:#f87171;">'
      +'<i class="fa-solid fa-circle-exclamation"></i> 解析失敗：'+err.message+'<br><span style="color:#64748b;font-size:12px;">請確認 Claude API Key 已設定，或改用手動輸入方式</span>'
      +'</div>';
  } finally {
    btn.disabled = false;
    btn.innerHTML = '<i class="fa-solid fa-wand-magic-sparkles"></i> AI 解析並儲存';
  }
}

// ─── MANUAL SAVE ─────────────────────────────────────────────────────────────
function manualSaveCustomer() {
  var company = document.getElementById('m-company').value.trim();
  var contact = document.getElementById('m-contact').value.trim();
  if (!company || !contact) { alert('請填入客戶公司與聯絡人'); return; }
  var r = {
    id: Date.now(),
    company: company,
    contact: contact,
    date: document.getElementById('m-date').value,
    model: document.getElementById('m-model').value.trim(),
    qty: parseInt(document.getElementById('m-qty').value)||null,
    price: document.getElementById('m-price').value.trim(),
    delivery: document.getElementById('m-delivery').value.trim(),
    status: document.getElementById('m-status').value,
    note: document.getElementById('m-note').value.trim(),
    raw: '',
    tags: []
  };
  custData.unshift(r);
  if (currentTab==='customer') renderCustomer(custData);
  // Clear
  ['m-company','m-contact','m-model','m-qty','m-price','m-delivery','m-note'].forEach(function(id){
    document.getElementById(id).value='';
  });
  closeImport();
}

function manualSaveEngineer() {
  var topic = document.getElementById('e-topic').value.trim();
  var engineer = document.getElementById('e-engineer').value.trim();
  if (!topic || !engineer) { alert('請填入主題與工程師'); return; }
  var r = {
    id: Date.now(),
    topic: topic,
    engineer: engineer,
    date: document.getElementById('e-date').value,
    instruction: document.getElementById('e-instruction').value.trim(),
    progress: document.getElementById('e-progress').value.trim()||'尚未回報',
    status: document.getElementById('e-status').value,
    tags: []
  };
  engData.unshift(r);
  if (currentTab==='engineer') renderEngineer(engData);
  ['e-topic','e-engineer','e-instruction','e-progress'].forEach(function(id){
    document.getElementById(id).value='';
  });
  closeImport();
}
