<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>WeChat AI Workspace</title>

<!-- Tailwind -->
<script src="https://cdn.tailwindcss.com"></script>

<!-- FontAwesome -->
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<style>
    body{
        background:#e8edf2;
        color:#1e293b;
    }

    .glass{
        background: rgba(255,255,255,0.72);
        backdrop-filter: blur(10px);
        border:1px solid rgba(255,255,255,0.4);
    }

    .soft-shadow{
        box-shadow:
        0 4px 20px rgba(0,0,0,0.05),
        0 2px 8px rgba(0,0,0,0.03);
    }

    textarea{
        resize:none;
    }

    .tag{
        background:#dbeafe;
        color:#1e40af;
    }

    .scroll-hide::-webkit-scrollbar{
        display:none;
    }

    .message-card{
        transition:all .2s ease;
    }

    .message-card:hover{
        transform:translateY(-2px);
    }

    .loader{
        border:3px solid #dbeafe;
        border-top:3px solid #2563eb;
        border-radius:50%;
        width:22px;
        height:22px;
        animation:spin 1s linear infinite;
    }

    @keyframes spin{
        0%{transform:rotate(0deg);}
        100%{transform:rotate(360deg);}
    }
</style>
</head>

<body class="min-h-screen">

<div class="max-w-7xl mx-auto p-4 md:p-6">

    <!-- HEADER -->
    <div class="mb-5">
        <div class="flex items-center gap-3">
            <div class="w-12 h-12 rounded-2xl bg-blue-500 text-white flex items-center justify-center text-xl">
                <i class="fa-brands fa-weixin"></i>
            </div>

            <div>
                <h1 class="text-2xl font-bold">
                    WeChat AI Workspace
                </h1>

                <p class="text-slate-500 text-sm">
                    客戶 / 工程訊息 AI 搜尋系統
                </p>
            </div>
        </div>
    </div>

    <!-- TOP -->
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-5">

        <!-- LEFT -->
        <div class="lg:col-span-1 space-y-5">

            <!-- SEARCH -->
            <div class="glass soft-shadow rounded-3xl p-5">

                <div class="flex items-center gap-2 mb-4">
                    <i class="fa-solid fa-magnifying-glass text-blue-500"></i>
                    <h2 class="font-semibold">
                        AI 搜尋
                    </h2>
                </div>

                <div class="space-y-3">

                    <input
                        id="searchInput"
                        type="text"
                        placeholder="搜尋 DG6ZM / 四向光 / 交期 / 32 RMB..."
                        class="w-full rounded-2xl border-0 bg-slate-100 px-4 py-3 focus:outline-none"
                    />

                    <button
                        onclick="searchMessages()"
                        class="w-full bg-blue-500 hover:bg-blue-600 text-white rounded-2xl py-3 font-semibold transition"
                    >
                        搜尋訊息
                    </button>
                </div>

            </div>

            <!-- OCR -->
            <div class="glass soft-shadow rounded-3xl p-5">

                <div class="flex items-center gap-2 mb-4">
                    <i class="fa-solid fa-image text-emerald-500"></i>
                    <h2 class="font-semibold">
                        微信截圖 OCR
                    </h2>
                </div>

                <input
                    id="imageInput"
                    type="file"
                    accept="image/*"
                    class="w-full bg-slate-100 rounded-2xl p-3"
                />

                <button
                    onclick="uploadImage()"
                    class="w-full mt-3 bg-emerald-500 hover:bg-emerald-600 text-white rounded-2xl py-3 font-semibold"
                >
                    上傳圖片解析
                </button>

            </div>

            <!-- TAGS -->
            <div class="glass soft-shadow rounded-3xl p-5">

                <div class="flex items-center gap-2 mb-4">
                    <i class="fa-solid fa-tags text-orange-500"></i>
                    <h2 class="font-semibold">
                        常用主題
                    </h2>
                </div>

                <div class="flex flex-wrap gap-2">

                    <button onclick="quickSearch('DG6ZM')" class="tag px-3 py-2 rounded-xl text-sm">
                        DG6ZM
                    </button>

                    <button onclick="quickSearch('四向光')" class="tag px-3 py-2 rounded-xl text-sm">
                        四向光
                    </button>

                    <button onclick="quickSearch('CBD')" class="tag px-3 py-2 rounded-xl text-sm">
                        CBD
                    </button>

                    <button onclick="quickSearch('交期')" class="tag px-3 py-2 rounded-xl text-sm">
                        交期
                    </button>

                    <button onclick="quickSearch('鑽身鑽淺')" class="tag px-3 py-2 rounded-xl text-sm">
                        鑽身鑽淺
                    </button>

                </div>

            </div>

        </div>

        <!-- RIGHT -->
        <div class="lg:col-span-2 space-y-5">

            <!-- INPUT -->
            <div class="glass soft-shadow rounded-3xl p-5">

                <div class="flex items-center gap-2 mb-4">
                    <i class="fa-solid fa-comment-dots text-blue-500"></i>
                    <h2 class="font-semibold">
                        貼上微信訊息
                    </h2>
                </div>

                <textarea
                    id="messageInput"
                    rows="10"
                    placeholder="請貼上微信聊天內容..."
                    class="w-full rounded-2xl bg-slate-100 p-4 focus:outline-none"
                ></textarea>

                <div class="mt-4 flex flex-col md:flex-row gap-3">

                    <select
                        id="messageType"
                        class="bg-slate-100 rounded-2xl px-4 py-3 focus:outline-none"
                    >
                        <option value="customer">客戶訊息</option>
                        <option value="engineer">工程訊息</option>
                    </select>

                    <button
                        onclick="analyzeMessage()"
                        class="flex-1 bg-blue-500 hover:bg-blue-600 text-white rounded-2xl py-3 font-semibold"
                    >
                        AI 解析並儲存
                    </button>

                </div>

            </div>

            <!-- RESULT -->
            <div class="glass soft-shadow rounded-3xl p-5">

                <div class="flex items-center justify-between mb-5">

                    <div class="flex items-center gap-2">
                        <i class="fa-solid fa-database text-indigo-500"></i>

                        <h2 class="font-semibold">
                            訊息資料庫
                        </h2>
                    </div>

                    <div id="loading" class="hidden loader"></div>

                </div>

                <div
                    id="messageList"
                    class="space-y-4 max-h-[700px] overflow-y-auto scroll-hide"
                >

                </div>

            </div>

        </div>

    </div>

</div>

<script>

//////////////////////////////////////////////////////
// CONFIG
//////////////////////////////////////////////////////

const SUPABASE_URL = "YOUR_SUPABASE_URL";
const SUPABASE_KEY = "YOUR_SUPABASE_ANON_KEY";

const OPENAI_PROXY_API = "/api/parse";

//////////////////////////////////////////////////////
// INIT
//////////////////////////////////////////////////////

loadMessages();

//////////////////////////////////////////////////////
// ANALYZE MESSAGE
//////////////////////////////////////////////////////

async function analyzeMessage(){

    const text = document.getElementById("messageInput").value.trim();
    const type = document.getElementById("messageType").value;

    if(!text){
        alert("請貼上訊息");
        return;
    }

    showLoading(true);

    try{

        const response = await fetch(OPENAI_PROXY_API,{
            method:"POST",
            headers:{
                "Content-Type":"application/json"
            },
            body:JSON.stringify({
                text,
                type
            })
        });

        const data = await response.json();

        console.log(data);

        await saveToSupabase(data, text, type);

        document.getElementById("messageInput").value = "";

        loadMessages();

    }catch(err){

        console.error(err);
        alert("AI解析失敗");

    }

    showLoading(false);

}

//////////////////////////////////////////////////////
// SAVE TO SUPABASE
//////////////////////////////////////////////////////

async function saveToSupabase(parsed, rawText, type){

    const payload = {
        type:type,
        raw_text:rawText,
        parsed_json:parsed,
        customer_name:parsed.customer_name || "",
        sender_name:parsed.sender_name || "",
        model:parsed.product_model || parsed.model || "",
        issue_type:parsed.issue_type || "",
        topic:parsed.topic || "",
        tags:parsed.tags || [],
        created_at:new Date().toISOString()
    };

    const response = await fetch(
        `${SUPABASE_URL}/rest/v1/messages`,
        {
            method:"POST",
            headers:{
                "apikey":SUPABASE_KEY,
                "Authorization":`Bearer ${SUPABASE_KEY}`,
                "Content-Type":"application/json",
                "Prefer":"return=minimal"
            },
            body:JSON.stringify(payload)
        }
    );

    if(!response.ok){
        throw new Error("Supabase save failed");
    }

}

//////////////////////////////////////////////////////
// LOAD
//////////////////////////////////////////////////////

async function loadMessages(){

    try{

        const response = await fetch(
            `${SUPABASE_URL}/rest/v1/messages?select=*&order=created_at.desc`,
            {
                headers:{
                    "apikey":SUPABASE_KEY,
                    "Authorization":`Bearer ${SUPABASE_KEY}`
                }
            }
        );

        const data = await response.json();

        renderMessages(data);

    }catch(err){

        console.error(err);

    }

}

//////////////////////////////////////////////////////
// RENDER
//////////////////////////////////////////////////////

function renderMessages(messages){

    const container = document.getElementById("messageList");

    if(!messages || messages.length === 0){

        container.innerHTML = `
            <div class="text-center text-slate-400 py-10">
                尚無資料
            </div>
        `;

        return;
    }

    container.innerHTML = messages.map(msg => {

        const p = msg.parsed_json || {};

        return `
            <div class="message-card bg-white rounded-3xl p-5 border border-slate-100">

                <div class="flex items-start justify-between gap-3">

                    <div>

                        <div class="flex items-center gap-2 flex-wrap">

                            <span class="px-3 py-1 rounded-full text-xs font-semibold
                            ${msg.type === 'customer'
                                ? 'bg-blue-100 text-blue-700'
                                : 'bg-emerald-100 text-emerald-700'}">

                                ${msg.type === 'customer'
                                    ? '客戶'
                                    : '工程'}

                            </span>

                            ${msg.customer_name
                                ? `<span class="text-sm font-semibold">${msg.customer_name}</span>`
                                : ''}

                            ${msg.model
                                ? `<span class="tag px-2 py-1 rounded-lg text-xs">${msg.model}</span>`
                                : ''}

                        </div>

                        <div class="mt-3 text-sm text-slate-700 whitespace-pre-wrap">
                            ${msg.raw_text}
                        </div>

                    </div>

                </div>

                <div class="mt-4 grid grid-cols-2 md:grid-cols-4 gap-3 text-sm">

                    ${p.quantity
                        ? `
                        <div class="bg-slate-100 rounded-2xl p-3">
                            <div class="text-slate-400 text-xs">數量</div>
                            <div class="font-semibold">${p.quantity}</div>
                        </div>
                        `
                        : ''}

                    ${p.price
                        ? `
                        <div class="bg-slate-100 rounded-2xl p-3">
                            <div class="text-slate-400 text-xs">價格</div>
                            <div class="font-semibold">${p.price}</div>
                        </div>
                        `
                        : ''}

                    ${p.delivery_time
                        ? `
                        <div class="bg-slate-100 rounded-2xl p-3">
                            <div class="text-slate-400 text-xs">交期</div>
                            <div class="font-semibold">${p.delivery_time}</div>
                        </div>
                        `
                        : ''}

                    ${p.issue_type
                        ? `
                        <div class="bg-slate-100 rounded-2xl p-3">
                            <div class="text-slate-400 text-xs">異常</div>
                            <div class="font-semibold">${p.issue_type}</div>
                        </div>
                        `
                        : ''}

                </div>

            </div>
        `;

    }).join("");

}

//////////////////////////////////////////////////////
// SEARCH
//////////////////////////////////////////////////////

async function searchMessages(){

    const keyword = document.getElementById("searchInput").value.trim();

    if(!keyword){
        loadMessages();
        return;
    }

    showLoading(true);

    try{

        const response = await fetch(
            `${SUPABASE_URL}/rest/v1/messages?raw_text=ilike.*${keyword}*&select=*`,
            {
                headers:{
                    "apikey":SUPABASE_KEY,
                    "Authorization":`Bearer ${SUPABASE_KEY}`
                }
            }
        );

        const data = await response.json();

        renderMessages(data);

    }catch(err){

        console.error(err);

    }

    showLoading(false);

}

//////////////////////////////////////////////////////
// QUICK SEARCH
//////////////////////////////////////////////////////

function quickSearch(text){

    document.getElementById("searchInput").value = text;

    searchMessages();

}

//////////////////////////////////////////////////////
// OCR IMAGE
//////////////////////////////////////////////////////

async function uploadImage(){

    const file = document.getElementById("imageInput").files[0];

    if(!file){
        alert("請選擇圖片");
        return;
    }

    const formData = new FormData();
    formData.append("image", file);

    showLoading(true);

    try{

        const response = await fetch("/api/ocr",{
            method:"POST",
            body:formData
        });

        const data = await response.json();

        document.getElementById("messageInput").value = data.text || "";

    }catch(err){

        console.error(err);
        alert("OCR失敗");
    }

    showLoading(false);

}

//////////////////////////////////////////////////////
// LOADING
//////////////////////////////////////////////////////

function showLoading(show){

    const el = document.getElementById("loading");

    if(show){
        el.classList.remove("hidden");
    }else{
        el.classList.add("hidden");
    }

}

</script>

</body>
</html>
